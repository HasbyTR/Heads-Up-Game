const TIMERS = [30,60,90];
const REFILL_THRESHOLD = 10;

function shuffle(a){return[...a].sort(()=>Math.random()-.5);}
function todayKey(){const d=new Date();return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;}
function getUsed(cat){try{const r=localStorage.getItem(`hu_used_${cat}_${todayKey()}`);return r?JSON.parse(r):[];}catch{return[];}}
function addUsed(cat,words){try{const e=getUsed(cat);localStorage.setItem(`hu_used_${cat}_${todayKey()}`,JSON.stringify([...new Set([...e,...words])]));}catch{}}
function loadCreated(){try{const s=localStorage.getItem("headsup_created");return s?JSON.parse(s):{};}catch{return{};}}
function saveCreatedLS(o){try{localStorage.setItem("headsup_created",JSON.stringify(o));}catch{}}

function buildDeck(cat,allCats){
  const all=allCats[cat]||[];
  const used=getUsed(cat);
  let avail=all.filter(w=>!used.includes(w));
  if(avail.length<=REFILL_THRESHOLD){avail=[...all];localStorage.removeItem(`hu_used_${cat}_${todayKey()}`);}
  return shuffle(avail);
}

function remainingInfo(cat,allCats){
  const all=allCats[cat]||[];
  const used=getUsed(cat);
  const rem=all.filter(w=>!used.includes(w)).length;
  if(rem<=REFILL_THRESHOLD)return{text:"🔄 Sıfırlandı",color:"#fbbf24"};
  return{text:`${rem}/${all.length} kelime`,color:"#a5b4fc"};
}

// ── State ────────────────────────────────────────────────
let S={
  screen:"menu",
  created:loadCreated(),
  selectedCat:null,
  selectedTimer:60,
  editKey:null,createCat:"",createWords:[],wordInput:"",
  confirmDelete:null,
  deck:[],cardIdx:0,timeLeft:0,correct:0,passed:0,flash:null,
  roundResults:[],
  timerIv:null,
};
function allCats(){return{...DEFAULT_CATEGORIES,...S.created};}
function set(patch){Object.assign(S,typeof patch==="function"?patch(S):patch);render();}

// ── Tilt ─────────────────────────────────────────────────
let tiltLocked=false;
let tiltEnabled=false;

function requestTilt(cb){
  if(typeof DeviceMotionEvent!=="undefined"&&typeof DeviceMotionEvent.requestPermission==="function"){
    DeviceMotionEvent.requestPermission().then(r=>{if(r==="granted"){tiltEnabled=true;}cb();}).catch(()=>cb());
  } else {tiltEnabled=true;cb();}
}

function onTilt(e){
  if(S.screen!=="playing"||tiltLocked)return;
  const beta=e.beta;
  if(beta===null)return;
  // Telefon yatay tutulduğunda beta ~0 civarı olur
  // Geriye eğ (yukarı = doğru): beta negatif (-20'nin altı)
  // İleriye eğ (aşağı = pas): beta pozitif (20'nin üstü ama yataydan itibaren)
  if(beta<-15){tiltLocked=true;doCorrect();setTimeout(()=>{tiltLocked=false;},1100);}
  else if(beta>15){tiltLocked=true;doPass();setTimeout(()=>{tiltLocked=false;},1100);}
}

// ── Game ─────────────────────────────────────────────────
function startGame(){
  if(!S.selectedCat)return;
  requestTilt(()=>{
    window.addEventListener("deviceorientation",onTilt,true);
    const deck=buildDeck(S.selectedCat,allCats());
    clearInterval(S.timerIv);
    const iv=setInterval(()=>{
      if(S.screen!=="playing"){clearInterval(iv);return;}
      set(s=>{
        if(s.timeLeft<=1){
          clearInterval(iv);
          window.removeEventListener("deviceorientation",onTilt,true);
          return{timeLeft:0,screen:"result",timerIv:null};
        }
        return{timeLeft:s.timeLeft-1};
      });
    },1000);
    set({deck,cardIdx:0,correct:0,passed:0,roundResults:[],timeLeft:S.selectedTimer,flash:null,screen:"playing",timerIv:iv});
  });
}

function doCorrect(){
  const word=S.deck[S.cardIdx];
  if(word){set(s=>({correct:s.correct+1,roundResults:[...s.roundResults,{word,result:"correct"}],cardIdx:s.cardIdx+1}));addUsed(S.selectedCat,[word]);}
  else set(s=>({cardIdx:s.cardIdx+1}));
  flashAnim("correct");
}
function doPass(){
  const word=S.deck[S.cardIdx];
  if(word){set(s=>({passed:s.passed+1,roundResults:[...s.roundResults,{word,result:"pass"}],cardIdx:s.cardIdx+1}));}
  else set(s=>({cardIdx:s.cardIdx+1}));
  flashAnim("pass");
}
let flashT=null;
function flashAnim(type){set({flash:type});clearTimeout(flashT);flashT=setTimeout(()=>set({flash:null}),500);}

function saveGame(){
  const key=S.createCat.trim();
  if(!key||S.createWords.length===0)return;
  const updated={...S.created};
  if(S.editKey&&S.editKey!==key)delete updated[S.editKey];
  updated[key]=S.createWords;
  saveCreatedLS(updated);
  set({created:updated,screen:"menu",editKey:null,createCat:"",createWords:[],wordInput:""});
}
function deleteGame(key){
  const updated={...S.created};delete updated[key];saveCreatedLS(updated);
  set({created:updated,confirmDelete:null,selectedCat:S.selectedCat===key?null:S.selectedCat});
}

// ── DOM helpers ──────────────────────────────────────────
function h(tag,attrs,children){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  for(const c of(children||[])){
    if(c==null)continue;
    if(typeof c==="string"||typeof c==="number")e.appendChild(document.createTextNode(String(c)));
    else e.appendChild(c);
  }
  return e;
}
const div=(a,c)=>h("div",a,c);
const btn=(a,c)=>h("button",a,c);
const inp=a=>h("input",a);
const span=(a,c)=>h("span",a,c);

        div({style:{fontSize:"11px",color:"#6b7280",marginBottom:"8px",letterSpacing:"2px",textTransform:"uppercase"}},[selectedCat]),

  const{createCat,createWords,wordInput,editKey}=S;
  const canSave=createCat.trim()&&createWords.length>0;

  const catInp=inp({value:createCat,placeholder:"ör. Türk Oyuncular",style:{width:"100%",padding:"10px 14px",borderRadius:"10px",border:"1.5px solid #e5e7eb",fontSize:"15px",outline:"none",marginTop:"8px",marginBottom:"20px"}});
  catInp.addEventListener("input",e=>{S.createCat=e.target.value;});

  const wInp=inp({value:wordInput,placeholder:"Kelime yaz, Enter veya Ekle",style:{flex:"1",padding:"10px 14px",borderRadius:"10px",border:"1.5px solid #e5e7eb",fontSize:"15px",outline:"none"}});
  wInp.addEventListener("input",e=>{S.wordInput=e.target.value;});
  wInp.addEventListener("keydown",e=>{if(e.key==="Enter"){const w=S.wordInput.trim();if(w&&!S.createWords.includes(w))set(s=>({createWords:[...s.createWords,w],wordInput:""}));else set({wordInput:""});}});

  const chips=createWords.map(w=>span({style:{background:"#ede9fe",color:"#4f46e5",borderRadius:"99px",padding:"6px 12px",fontSize:"14px",fontWeight:"600",display:"inline-flex",alignItems:"center",gap:"6px"}},[
    w,
    span({style:{cursor:"pointer",color:"#7c3aed",fontWeight:"900"},onClick:()=>set(s=>({createWords:s.createWords.filter(x=>x!==w)}))},["×"])
  ]));

  return div({style:{minHeight:"100vh",background:"#f9fafb",padding:"env(safe-area-inset-top,24px) 16px 24px"}},[
    div({style:{maxWidth:"420px",margin:"0 auto"}},[
      btn({style:{background:"none",border:"none",color:"#4f46e5",fontSize:"15px",marginBottom:"16px",padding:"0"},onClick:()=>set({screen:"menu"})},["← Geri"]),
      div({style:{fontSize:"26px",fontWeight:"800",color:"#1e1b4b",marginBottom:"20px"}},[editKey?"✏️ Düzenle":"✏️ Oyun Oluştur"]),
      div({style:{fontSize:"13px",color:"#6b7280",fontWeight:"600"}},["KATEGORİ ADI"]),
      catInp,
      div({style:{fontSize:"13px",color:"#6b7280",fontWeight:"600"}},["KELİMELER ("+createWords.length+")"]),
      div({style:{display:"flex",gap:"8px",margin:"8px 0 12px"}},[
        wInp,
        btn({style:{padding:"10px 16px",borderRadius:"10px",background:"#4f46e5",border:"none",color:"#fff",fontWeight:"700"},onClick:()=>{const w=S.wordInput.trim();if(w&&!S.createWords.includes(w))set(s=>({createWords:[...s.createWords,w],wordInput:""}));else set({wordInput:""});}},[" Ekle"])
      ]),
      div({style:{display:"flex",flexWrap:"wrap",gap:"8px",minHeight:"40px",marginBottom:"28px"}},chips.length?chips:[span({style:{color:"#d1d5db",fontSize:"14px"}},["Henüz kelime yok..."])]),
      btn({style:{width:"100%",padding:"15px 0",borderRadius:"14px",background:canSave?"#4f46e5":"#e5e7eb",border:"none",color:canSave?"#fff":"#9ca3af",fontSize:"16px",fontWeight:"700"},onClick:saveGame},["💾 Kaydet"])
    ])
  ]);
}

function renderMenu(){
  const{selectedCat,selectedTimer,created,confirmDelete}=S;
  const ac=allCats();
  const createdKeys=Object.keys(created);

  const timerBtns=TIMERS.map(t=>btn({
    style:{flex:"1",padding:"10px 0",borderRadius:"12px",border:selectedTimer===t?"2px solid #818cf8":"2px solid transparent",background:selectedTimer===t?"#4f46e5":"rgba(255,255,255,.13)",color:"#fff",fontSize:"16px",fontWeight:"700"},
    onClick:()=>set({selectedTimer:t})
  },[t+"s"]));

  const defBtns=Object.keys(DEFAULT_CATEGORIES).map(cat=>{
    const ri=remainingInfo(cat,ac);
    return btn({
      style:{padding:"16px 20px",borderRadius:"16px",background:selectedCat===cat?"#4f46e5":"rgba(255,255,255,.11)",border:selectedCat===cat?"2px solid #818cf8":"2px solid transparent",color:"#fff",fontSize:"15px",fontWeight:"600",textAlign:"left",width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center"},
      onClick:()=>set({selectedCat:cat})
    },[span({},[cat]),span({style:{fontSize:"11px",color:ri.color}},[ri.text])]);
  });

  const createdBtns=createdKeys.map(cat=>{
    const ri=remainingInfo(cat,ac);
    return div({style:{borderRadius:"16px",overflow:"hidden",border:selectedCat===cat?"2px solid #4ade80":"2px solid transparent"}},[
      btn({style:{width:"100%",padding:"16px 20px",background:selectedCat===cat?"#16a34a":"rgba(255,255,255,.11)",border:"none",color:"#fff",fontSize:"15px",fontWeight:"600",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"},onClick:()=>set({selectedCat:cat})},[
        span({},[cat]),span({style:{fontSize:"11px",color:ri.color}},[ri.text])
      ]),
      div({style:{display:"flex",background:"rgba(255,255,255,.06)"}},[
        btn({style:{flex:"1",padding:"9px 0",background:"none",border:"none",borderRight:"1px solid rgba(255,255,255,.1)",color:"#a5b4fc",fontSize:"13px",fontWeight:"600"},onClick:()=>{set({editKey:cat,createCat:cat,createWords:[...created[cat]],wordInput:"",screen:"create"});}},["✏️ Düzenle"]),
        btn({style:{flex:"1",padding:"9px 0",background:"none",border:"none",color:"#fca5a5",fontSize:"13px",fontWeight:"600"},onClick:()=>set({confirmDelete:cat})},["🗑 Sil"])
      ])
    ]);
  });

  const menuEl=div({style:{minHeight:"100vh",background:"linear-gradient(160deg,#1e1b4b 0%,#312e81 60%,#4f46e5 100%)",padding:"env(safe-area-inset-top,32px) 16px 32px"}},[
    div({style:{maxWidth:"420px",margin:"0 auto"}},[
      div({style:{textAlign:"center",marginBottom:"28px"}},[
        div({style:{fontSize:"48px"}},["🎯"]),
        div({style:{fontSize:"32px",fontWeight:"900",color:"#fff",margin:"8px 0 4px"}},["Heads Up!"]),
        div({style:{color:"#a5b4fc",fontSize:"15px"}},["Telefonu alnına tut!"])
      ]),
      div({style:{background:"rgba(255,255,255,.11)",borderRadius:"18px",padding:"16px 20px",marginBottom:"20px"}},[
        div({style:{color:"#c7d2fe",fontSize:"12px",fontWeight:"700",letterSpacing:"1.5px",marginBottom:"10px"}},["⏱ SÜRE"]),
        div({style:{display:"flex",gap:"10px"}},timerBtns)
      ]),
      div({style:{color:"#c7d2fe",fontSize:"12px",fontWeight:"700",letterSpacing:"1.5px",marginBottom:"10px"}},["📂 KATEGORİLER"]),
      div({style:{display:"flex",flexDirection:"column",gap:"10px",marginBottom:"20px"}},defBtns),
      ...(createdKeys.length?[
        div({style:{color:"#86efac",fontSize:"12px",fontWeight:"700",letterSpacing:"1.5px",marginBottom:"10px"}},["🛠 OLUŞTURULAN OYUNLAR"]),
        div({style:{display:"flex",flexDirection:"column",gap:"10px",marginBottom:"20px"}},createdBtns)
      ]:[]),
      btn({
        style:{width:"100%",padding:"18px 0",borderRadius:"18px",background:selectedCat?"#818cf8":"rgba(255,255,255,.13)",border:"none",color:selectedCat?"#fff":"rgba(255,255,255,.35)",fontSize:"18px",fontWeight:"800",marginBottom:"12px"},
        onClick:startGame
      },[selectedCat?"▶ Başla — "+selectedCat:"Önce kategori seç"]),
      btn({style:{width:"100%",padding:"15px 0",borderRadius:"18px",background:"rgba(255,255,255,.11)",border:"2px solid rgba(255,255,255,.2)",color:"#fff",fontSize:"16px",fontWeight:"700"},onClick:()=>set({editKey:null,createCat:"",createWords:[],wordInput:"",screen:"create"})},["✏️ Oyun Oluştur"])
    ])
  ]);

  if(confirmDelete){
    menuEl.appendChild(div({style:{position:"fixed",inset:"0",background:"rgba(0,0,0,.65)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:"99",padding:"24px"}},[
      div({style:{background:"#fff",borderRadius:"24px",padding:"32px 24px",maxWidth:"320px",width:"100%",textAlign:"center"}},[
        div({style:{fontSize:"36px",marginBottom:"12px"}},["🗑"]),
        div({style:{fontSize:"20px",fontWeight:"800",color:"#1e1b4b",marginBottom:"8px"}},["\""+confirmDelete+"\" silinsin mi?"]),
        div({style:{color:"#6b7280",fontSize:"14px",marginBottom:"24px"}},["Bu işlem geri alınamaz."]),
        div({style:{display:"flex",gap:"10px"}},[
          btn({style:{flex:"1",padding:"12px 0",borderRadius:"12px",background:"#f3f4f6",border:"none",color:"#374151",fontSize:"15px",fontWeight:"600"},onClick:()=>set({confirmDelete:null})},["İptal"]),
          btn({style:{flex:"1",padding:"12px 0",borderRadius:"12px",background:"#ef4444",border:"none",color:"#fff",fontSize:"15px",fontWeight:"700"},onClick:()=>deleteGame(confirmDelete)},["Sil"])
        ])
      ])
    ]));
  }
  return menuEl;
}

// ── Main render ──────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  if(S.screen==="playing")app.appendChild(renderPlaying());
  else if(S.screen==="result")app.appendChild(renderResult());
  else if(S.screen==="create")app.appendChild(renderCreate());
  else app.appendChild(renderMenu());
}

render();
</script>
</body>
</html>
