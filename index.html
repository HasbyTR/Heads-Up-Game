const TIMERS = [30, 60, 90];
const REFILL = 10;
const CD_FROM = 5;

// ════════════════════════════════════════════
// STORAGE
// ════════════════════════════════════════════
function todayKey() {
  const d = new Date();
  return d.getFullYear() + '-' + d.getMonth() + '-' + d.getDate();
}
function getUsed(cat) {
  try { return JSON.parse(localStorage.getItem('hu_' + cat + '_' + todayKey()) || '[]'); } catch { return []; }
}
function markUsed(cat, words) {
  try {
    const existing = getUsed(cat);
    localStorage.setItem('hu_' + cat + '_' + todayKey(), JSON.stringify([...new Set([...existing, ...words])]));
  } catch {}
}
function loadCreated() {
  try { return JSON.parse(localStorage.getItem('hu_created') || '{}'); } catch { return {}; }
}
function saveCreated(obj) {
  try { localStorage.setItem('hu_created', JSON.stringify(obj)); } catch {}
}

// ════════════════════════════════════════════
// GAME STATE
// ════════════════════════════════════════════
const G = {
  screen: 'menu',       // menu | waitLand | countdown | playing | paused | result | create
  created: loadCreated(),
  selCat: null,
  selTimer: 60,
  deck: [], idx: 0,
  correct: 0, passed: 0,
  results: [],
  timeLeft: 0,
  countdown: CD_FROM,
  // create/edit
  editKey: null, newCat: '', newWords: [],
  delConfirm: null,
};

function allCats() { return Object.assign({}, CATS, G.created); }

function buildDeck(cat) {
  const all = allCats()[cat] || [];
  const used = getUsed(cat);
  let avail = all.filter(w => !used.includes(w));
  if (avail.length <= REFILL) {
    avail = all.slice();
    localStorage.removeItem('hu_' + cat + '_' + todayKey());
  }
  return avail.sort(() => Math.random() - 0.5);
}

function remText(cat) {
  const all = allCats()[cat] || [];
  const r = all.filter(w => !getUsed(cat).includes(w)).length;
  if (r <= REFILL) return { t: '🔄 Sıfırlandı', c: '#fbbf24' };
  return { t: r + '/' + all.length + ' kelime', c: '#a5b4fc' };
}

// ════════════════════════════════════════════
// ORIENTATION & TILT
// ════════════════════════════════════════════
/*
  Telefon LANDSCAPE (yan) tutulduğunda:
    gamma ≈ ±90  (sağa veya sola yatık)
    |gamma| > 45 → landscape olarak kabul ediyoruz

  Landscape'de telefon ALNINA tutulduğunda (ekran dışarı bakıyor):
    beta ≈ 0 civarı (düz)

  Ekran YUKARI eğilince (doğru - correct):
    beta negatife gider → beta < -20

  Ekran AŞAĞI eğilince (pas - pass):
    beta pozitife gider → beta > 20
*/

let lastBeta = null;
let lastGamma = null;
let tiltCooldown = false;
let orientReady = false;

function isLandscape(gamma) {
  // Telefon yan: |gamma| > 75
  return gamma !== null && Math.abs(gamma) > 75;
}

function isPortrait(gamma) {
  // Telefon dik: |gamma| < 30 → pause tetikler
  // 30-75 arası geçiş zonu — hiçbir şey tetiklenmez
  return gamma !== null && Math.abs(gamma) < 30;
}

// Beta'yı gamma işaretine göre normalize et:
// Sağa yatık (gamma>0): beta olduğu gibi kullanılır
// Sola yatık (gamma<0): beta'nın işareti tersine çevrilir
// Böylece her iki yatış yönünde de:
//   normalizedBeta < -50 → ekran yukarı → DOĞRU
//   normalizedBeta >  50 → ekran aşağı  → PAS
function normalizedBeta(beta, gamma) {
  if (beta === null || gamma === null) return null;
  return gamma >= 0 ? beta : -beta;
}

function onOrient(e) {
  const beta = e.beta;
  const gamma = e.gamma;
  lastBeta = beta;
  lastGamma = gamma;

  const land = isLandscape(gamma);
  const port = isPortrait(gamma);

  // waitLand → countdown: telefon yana gelince başlat
  if (G.screen === 'waitLand' && land) {
    startCountdown();
    return;
  }

  // playing → paused: sadece gerçekten dik tutulunca (|gamma| < 30)
  if (G.screen === 'playing' && port) {
    pauseGame();
    return;
  }

  // paused → playing: tekrar yana gelince devam
  if (G.screen === 'paused' && land) {
    resumeGame();
    return;
  }

  // Tilt — sadece oyun sırasında, landscape'de ve cooldown yoksa
  if (G.screen !== 'playing' || !land || tiltCooldown) return;

  const nb = normalizedBeta(beta, gamma);
  if (nb === null) return;

  // nb < -50 → ekran yukarı → DOĞRU
  if (nb < -50) {
    tiltCooldown = true;
    doCorrect();
    setTimeout(() => { tiltCooldown = false; }, 1400);
  }
  // nb > 50 → ekran aşağı → PAS
  else if (nb > 50) {
    tiltCooldown = true;
    doPass();
    setTimeout(() => { tiltCooldown = false; }, 1400);
  }
}

function registerOrient() {
  if (orientReady) return;
  orientReady = true;
  window.addEventListener('deviceorientation', onOrient, true);
}

function requestOrientPermission(cb) {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(r => { if (r === 'granted') registerOrient(); cb(); })
      .catch(() => cb());
  } else {
    registerOrient();
    cb();
  }
}

// Register right away on non-iOS
if (typeof DeviceOrientationEvent === 'undefined' ||
    typeof DeviceOrientationEvent.requestPermission !== 'function') {
  registerOrient();
}

// ════════════════════════════════════════════
// TIMERS
// ════════════════════════════════════════════
let gameTimerInterval = null;
let countdownInterval = null;

function startGameTimer() {
  clearInterval(gameTimerInterval);
  gameTimerInterval = setInterval(() => {
    if (G.screen !== 'playing') { clearInterval(gameTimerInterval); return; }
    G.timeLeft--;
    updateTimerUI();
    if (G.timeLeft <= 0) {
      clearInterval(gameTimerInterval);
      goScreen('result');
    }
  }, 1000);
}

function stopGameTimer() {
  clearInterval(gameTimerInterval);
}

function startCountdown() {
  clearInterval(countdownInterval);
  G.countdown = CD_FROM;
  goScreen('countdown');
  countdownInterval = setInterval(() => {
    G.countdown--;
    const el = document.getElementById('cdNum');
    if (el) el.textContent = G.countdown;
    if (G.countdown <= 0) {
      clearInterval(countdownInterval);
      goScreen('playing');
      startGameTimer();
    }
  }, 1000);
}

function pauseGame() {
  stopGameTimer();
  goScreen('paused');
}

function resumeGame() {
  goScreen('playing');
  startGameTimer();
}

// ════════════════════════════════════════════
// GAME ACTIONS
// ════════════════════════════════════════════
let flashTimeout = null;

function doCorrect() {
  const word = G.deck[G.idx];
  if (word) { G.correct++; G.results.push({ word, r: 'correct' }); markUsed(G.selCat, [word]); }
  G.idx++;
  showFlash('correct');
}

function doPass() {
  const word = G.deck[G.idx];
  if (word) { G.passed++; G.results.push({ word, r: 'pass' }); }
  G.idx++;
  showFlash('pass');
}

function showFlash(type) {
  const bg = document.getElementById('playBg');
  if (!bg) return;
  bg.style.background = type === 'correct' ? '#16a34a' : '#dc2626';
  updateWordUI();
  updateScoreUI();
  clearTimeout(flashTimeout);
  flashTimeout = setTimeout(() => {
    if (bg) bg.style.background = '#1e1b4b';
  }, 500);
}

function updateTimerUI() {
  const bar = document.getElementById('tBar');
  const lbl = document.getElementById('tLbl');
  if (!bar || !lbl) return;
  const pct = (G.timeLeft / G.selTimer) * 100;
  const c = G.timeLeft <= 10 ? '#ef4444' : G.timeLeft <= 20 ? '#f97316' : '#22c55e';
  bar.style.width = pct + '%';
  bar.style.background = c;
  lbl.textContent = G.timeLeft + 's';
  lbl.style.color = c;
}

function updateWordUI() {
  const el = document.getElementById('wordTxt');
  if (!el) return;
  const word = G.deck[G.idx] || null;
  el.textContent = word || '🎉 Kartlar bitti!';
  el.style.fontSize = word ? '34px' : '22px';
  el.style.color = word ? '#1e1b4b' : '#6b7280';
}

function updateScoreUI() {
  const c = document.getElementById('scoreCorrect');
  const p = document.getElementById('scorePassed');
  if (c) c.textContent = '✅ ' + G.correct;
  if (p) p.textContent = '⏭ ' + G.passed;
}

// ════════════════════════════════════════════
// ROUTING
// ════════════════════════════════════════════
function goScreen(name) {
  G.screen = name;
  render();
}

function startGame() {
  if (!G.selCat) return;
  G.deck = buildDeck(G.selCat);
  G.idx = 0; G.correct = 0; G.passed = 0; G.results = [];
  G.timeLeft = G.selTimer;
  stopGameTimer();
  clearInterval(countdownInterval);

  requestOrientPermission(() => {
    // If gamma is known and landscape → go straight to countdown
    // If gamma unknown (null) or portrait → wait for landscape
    if (lastGamma !== null && isLandscape(lastGamma)) {
      startCountdown();
    } else {
      goScreen('waitLand');
    }
  });
}

// ════════════════════════════════════════════
// RENDER HELPERS
// ════════════════════════════════════════════
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else if (k === 'onClick') e.addEventListener('click', v);
    else if (k === 'onInput') e.addEventListener('input', v);
    else if (k === 'onKeydown') e.addEventListener('keydown', v);
    else e.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null) continue;
    e.appendChild(c instanceof Node ? c : document.createTextNode(String(c)));
  }
  return e;
}
const D = (a, ...c) => el('div', a, ...c);
const B = (a, ...c) => el('button', a, ...c);
const S = (a, ...c) => el('span', a, ...c);
const I = (a) => el('input', a);

const FULL = { minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '28px 16px' };

function screenPlaying() {
  const word = G.deck[G.idx] || null;
  const pct = (G.timeLeft / G.selTimer) * 100;
  const tc = G.timeLeft <= 10 ? '#ef4444' : G.timeLeft <= 20 ? '#f97316' : '#22c55e';

  return D({ id: 'playBg', style: { minHeight: '100vh', background: '#1e1b4b', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'space-between', padding: '24px 16px', transition: 'background .35s', userSelect: 'none' } },
    // Top bar
    D({ style: { width: '100%', maxWidth: '420px' } },
      D({ style: { display: 'flex', justifyContent: 'space-between', color: '#fff', marginBottom: '8px', fontSize: '15px', fontWeight: '600' } },
        S({ id: 'scoreCorrect' }, '✅ ' + G.correct),
        S({ id: 'tLbl', style: { fontSize: '24px', fontWeight: '800', color: tc } }, G.timeLeft + 's'),
        S({ id: 'scorePassed' }, '⏭ ' + G.passed)
      ),
      D({ style: { background: '#ffffff30', borderRadius: '99px', height: '8px', overflow: 'hidden' } },
        D({ id: 'tBar', style: { height: '100%', width: pct + '%', background: tc, borderRadius: '99px', transition: 'width 1s linear' } })
      )
    ),
    // Word card
    D({ style: { flex: '1', display: 'flex', alignItems: 'center', justifyContent: 'center', width: '100%', maxWidth: '420px' } },
      D({ style: { background: '#fff', borderRadius: '28px', padding: '48px 28px', textAlign: 'center', width: '100%', boxShadow: '0 12px 40px rgba(0,0,0,.3)' } },
        D({ style: { fontSize: '11px', color: '#9ca3af', marginBottom: '12px', letterSpacing: '2px', textTransform: 'uppercase' } }, G.selCat),
        D({ id: 'wordTxt', style: { fontSize: word ? '34px' : '22px', fontWeight: '800', color: word ? '#1e1b4b' : '#6b7280', lineHeight: '1.2', minHeight: '90px', display: 'flex', alignItems: 'center', justifyContent: 'center' } },
          word || '🎉 Kartlar bitti!'
        )
      )
    ),
    // Buttons
    D({ style: { width: '100%', maxWidth: '420px' } },
      D({ style: { color: '#ffffff80', textAlign: 'center', fontSize: '12px', marginBottom: '12px' } },
        'Ekran YUKARI (beta<-20) → ✅   Ekran AŞAĞI (beta>20) → ⏭'
      ),
      D({ style: { display: 'flex', gap: '12px' } },
        B({ style: { flex: '1', padding: '22px 0', borderRadius: '18px', background: '#ef4444', color: '#fff', fontSize: '18px', fontWeight: '700' }, onClick: doPass }, '⬇ Pas'),
        B({ style: { flex: '1', padding: '22px 0', borderRadius: '18px', background: '#22c55e', color: '#fff', fontSize: '18px', fontWeight: '700' }, onClick: doCorrect }, '⬆ Doğru')
      )
    )
  );
}

function screenResult() {
  const items = G.results.map(r =>
    D({ style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: r.r === 'correct' ? '#f0fdf4' : '#fef2f2', borderRadius: '12px', padding: '10px 16px', marginBottom: '6px' } },
      S({ style: { fontWeight: '600', color: '#1e1b4b', fontSize: '15px' } }, r.word),
      S({ style: { fontSize: '20px' } }, r.r === 'correct' ? '✅' : '⏭')
    )
  );
  return D({ style: { minHeight: '100vh', background: 'linear-gradient(135deg,#1e1b4b,#312e81)', padding: '32px 16px', overflowY: 'auto' } },
    D({ style: { maxWidth: '440px', margin: '0 auto' } },
      D({ style: { background: '#fff', borderRadius: '28px', padding: '32px 24px', boxShadow: '0 8px 40px rgba(0,0,0,.4)' } },
        D({ style: { textAlign: 'center', marginBottom: '24px' } },
          D({ style: { fontSize: '56px' } }, '🎉'),
          D({ style: { fontSize: '28px', fontWeight: '800', color: '#1e1b4b', margin: '10px 0 4px' } }, 'Süre Doldu!'),
          D({ style: { color: '#6b7280', fontSize: '15px' } }, G.selCat)
        ),
        D({ style: { display: 'flex', gap: '16px', justifyContent: 'center', marginBottom: '24px' } },
          D({ style: { background: '#f0fdf4', borderRadius: '18px', padding: '18px 32px', textAlign: 'center' } },
            D({ style: { fontSize: '40px', fontWeight: '900', color: '#16a34a' } }, G.correct),
            D({ style: { fontSize: '13px', color: '#16a34a', fontWeight: '600' } }, 'Doğru')
          ),
          D({ style: { background: '#fef2f2', borderRadius: '18px', padding: '18px 32px', textAlign: 'center' } },
            D({ style: { fontSize: '40px', fontWeight: '900', color: '#dc2626' } }, G.passed),
            D({ style: { fontSize: '13px', color: '#dc2626', fontWeight: '600' } }, 'Pas')
          )
        ),
        items.length ? D({ style: { marginBottom: '24px' } },
          D({ style: { fontSize: '11px', fontWeight: '700', color: '#9ca3af', letterSpacing: '2px', marginBottom: '12px' } }, 'BU TURDAKİ KELİMELER'),
          ...items
        ) : null,
        B({ style: { width: '100%', padding: '16px', borderRadius: '16px', background: '#4f46e5', color: '#fff', fontSize: '16px', fontWeight: '700', marginBottom: '10px' }, onClick: startGame }, '🔄 Tekrar Oyna'),
        B({ style: { width: '100%', padding: '16px', borderRadius: '16px', background: '#f3f4f6', color: '#374151', fontSize: '16px', fontWeight: '600' }, onClick: () => goScreen('menu') }, '← Ana Menü')
      )
    )
  );
}

function screenCreate() {
  const canSave = G.newCat.trim() && G.newWords.length > 0;
  let wordInputRef = null;

  const catInput = I({ value: G.newCat, placeholder: 'ör. Türk Oyuncular', style: { width: '100%', padding: '12px 16px', borderRadius: '12px', border: '1.5px solid #e5e7eb', fontSize: '16px', marginTop: '8px', marginBottom: '20px', display: 'block' } });
  catInput.addEventListener('input', e => { G.newCat = e.target.value; });

  const wInput = I({ value: '', placeholder: 'Kelime yaz, Enter veya Ekle', style: { flex: '1', padding: '12px 16px', borderRadius: '12px', border: '1.5px solid #e5e7eb', fontSize: '16px' } });
  wInput.addEventListener('keydown', e => { if (e.key === 'Enter') { addWordFromInput(wInput); } });
  wordInputRef = wInput;

  function addWordFromInput(inp) {
    const w = inp.value.trim();
    if (w && !G.newWords.includes(w)) { G.newWords.push(w); inp.value = ''; rebuildChips(); }
    else inp.value = '';
  }

  const chipsBox = D({ style: { display: 'flex', flexWrap: 'wrap', gap: '8px', minHeight: '48px', marginBottom: '28px', padding: '4px 0' } });

  function rebuildChips() {
    chipsBox.innerHTML = '';
    if (G.newWords.length === 0) {
      chipsBox.appendChild(S({ style: { color: '#d1d5db', fontSize: '14px' } }, 'Henüz kelime yok...'));
      return;
    }
    G.newWords.forEach(w => {
      const chip = S({ style: { background: '#ede9fe', color: '#4f46e5', borderRadius: '99px', padding: '7px 14px', fontSize: '14px', fontWeight: '600', display: 'inline-flex', alignItems: 'center', gap: '6px' } },
        w,
        S({ style: { cursor: 'pointer', color: '#7c3aed', fontWeight: '900', fontSize: '16px' }, onClick: () => { G.newWords = G.newWords.filter(x => x !== w); rebuildChips(); } }, '×')
      );
      chipsBox.appendChild(chip);
    });
  }
  rebuildChips();

  const saveBtn = B({ style: { width: '100%', padding: '16px', borderRadius: '16px', background: canSave ? '#4f46e5' : '#e5e7eb', color: canSave ? '#fff' : '#9ca3af', fontSize: '16px', fontWeight: '700' }, onClick: () => {
    const key = G.newCat.trim();
    if (!key || G.newWords.length === 0) return;
    const upd = Object.assign({}, G.created);
    if (G.editKey && G.editKey !== key) delete upd[G.editKey];
    upd[key] = G.newWords.slice();
    G.created = upd;
    saveCreated(upd);
    if (G.selCat === G.editKey) G.selCat = key;
    G.editKey = null; G.newCat = ''; G.newWords = [];
    goScreen('menu');
  }}, '💾 Kaydet');

  return D({ style: { minHeight: '100vh', background: '#f8fafc', padding: '28px 16px' } },
    D({ style: { maxWidth: '440px', margin: '0 auto' } },
      B({ style: { background: 'none', color: '#4f46e5', fontSize: '15px', marginBottom: '20px', padding: '0', fontWeight: '600' }, onClick: () => goScreen('menu') }, '← Geri'),
      D({ style: { fontSize: '26px', fontWeight: '800', color: '#1e1b4b', marginBottom: '24px' } }, G.editKey ? '✏️ Düzenle' : '✏️ Oyun Oluştur'),
      D({ style: { fontSize: '12px', color: '#6b7280', fontWeight: '700', letterSpacing: '1px' } }, 'KATEGORİ ADI'),
      catInput,
      D({ style: { fontSize: '12px', color: '#6b7280', fontWeight: '700', letterSpacing: '1px' } }, 'KELİMELER (' + G.newWords.length + ')'),
      D({ style: { display: 'flex', gap: '10px', margin: '10px 0 14px' } },
        wInput,
        B({ style: { padding: '12px 18px', borderRadius: '12px', background: '#4f46e5', color: '#fff', fontWeight: '700', fontSize: '15px' }, onClick: () => addWordFromInput(wInput) }, 'Ekle')
      ),
      chipsBox,
      saveBtn
    )
  );
}

function screenMenu() {
  const ac = allCats();
  const crKeys = Object.keys(G.created);

  const timerRow = D({ style: { display: 'flex', gap: '10px' } },
    ...TIMERS.map(t => B({
      style: { flex: '1', padding: '12px 0', borderRadius: '14px', border: G.selTimer === t ? '2px solid #818cf8' : '2px solid transparent', background: G.selTimer === t ? '#4f46e5' : 'rgba(255,255,255,.13)', color: '#fff', fontSize: '17px', fontWeight: '700' },
      onClick: () => { G.selTimer = t; goScreen('menu'); }
    }, t + 's'))
  );

  const defList = D({},
    ...Object.keys(CATS).map(cat => {
      const ri = remText(cat);
      return B({
        style: { width: '100%', padding: '16px 20px', borderRadius: '18px', background: G.selCat === cat ? '#4f46e5' : 'rgba(255,255,255,.11)', border: G.selCat === cat ? '2px solid #818cf8' : '2px solid transparent', color: '#fff', fontSize: '15px', fontWeight: '600', textAlign: 'left', display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '10px' },
        onClick: () => { G.selCat = cat; goScreen('menu'); }
      },
        S({}, cat),
        S({ style: { fontSize: '11px', color: ri.c } }, ri.t)
      );
    })
  );

  const crSection = crKeys.length ? D({},
    D({ style: { color: '#86efac', fontSize: '12px', fontWeight: '700', letterSpacing: '1.5px', marginBottom: '10px', marginTop: '6px' } }, '🛠 OLUŞTURULAN OYUNLAR'),
    ...crKeys.map(cat => {
      const ri = remText(cat);
      return D({ style: { borderRadius: '18px', overflow: 'hidden', border: G.selCat === cat ? '2px solid #4ade80' : '2px solid transparent', marginBottom: '10px' } },
        B({ style: { width: '100%', padding: '16px 20px', background: G.selCat === cat ? '#16a34a' : 'rgba(255,255,255,.11)', color: '#fff', fontSize: '15px', fontWeight: '600', textAlign: 'left', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }, onClick: () => { G.selCat = cat; goScreen('menu'); } },
          S({}, cat), S({ style: { fontSize: '11px', color: ri.c } }, ri.t)
        ),
        D({ style: { display: 'flex', background: 'rgba(255,255,255,.07)' } },
          B({ style: { flex: '1', padding: '10px 0', background: 'none', borderRight: '1px solid rgba(255,255,255,.1)', color: '#a5b4fc', fontSize: '13px', fontWeight: '600' }, onClick: () => { G.editKey = cat; G.newCat = cat; G.newWords = G.created[cat].slice(); goScreen('create'); } }, '✏️ Düzenle'),
          B({ style: { flex: '1', padding: '10px 0', background: 'none', color: '#fca5a5', fontSize: '13px', fontWeight: '600' }, onClick: () => { G.delConfirm = cat; goScreen('menu'); } }, '🗑 Sil')
        )
      );
    })
  ) : null;

  const wrap = D({ style: { minHeight: '100vh', background: 'linear-gradient(160deg,#1e1b4b 0%,#312e81 55%,#4f46e5 100%)', padding: '36px 16px' } },
    D({ style: { maxWidth: '440px', margin: '0 auto' } },
      D({ style: { textAlign: 'center', marginBottom: '32px' } },
        D({ style: { fontSize: '52px' } }, '🎯'),
        D({ style: { fontSize: '34px', fontWeight: '900', color: '#fff', margin: '8px 0 4px' } }, 'Heads Up!'),
        D({ style: { color: '#a5b4fc', fontSize: '15px' } }, '📱 Telefonu yan çevir ve alnına tut!')
      ),
      D({ style: { background: 'rgba(255,255,255,.12)', borderRadius: '20px', padding: '18px 20px', marginBottom: '24px' } },
        D({ style: { color: '#c7d2fe', fontSize: '11px', fontWeight: '700', letterSpacing: '2px', marginBottom: '12px' } }, '⏱ SÜRE'),
        timerRow
      ),
      D({ style: { color: '#c7d2fe', fontSize: '11px', fontWeight: '700', letterSpacing: '2px', marginBottom: '12px' } }, '📂 KATEGORİLER'),
      defList,
      crSection,
      B({ style: { width: '100%', padding: '20px', borderRadius: '20px', background: G.selCat ? '#818cf8' : 'rgba(255,255,255,.13)', color: G.selCat ? '#fff' : 'rgba(255,255,255,.35)', fontSize: '18px', fontWeight: '800', marginTop: '8px', marginBottom: '12px' }, onClick: startGame },
        G.selCat ? '▶ Başla — ' + G.selCat : 'Önce kategori seç'
      ),
      B({ style: { width: '100%', padding: '16px', borderRadius: '20px', background: 'rgba(255,255,255,.1)', border: '2px solid rgba(255,255,255,.2)', color: '#fff', fontSize: '16px', fontWeight: '700' }, onClick: () => { G.editKey = null; G.newCat = ''; G.newWords = []; goScreen('create'); } }, '✏️ Oyun Oluştur')
    )
  );

  // Delete modal
  if (G.delConfirm) {
    const modal = D({ style: { position: 'fixed', inset: '0', background: 'rgba(0,0,0,.7)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: '999', padding: '24px' } },
      D({ style: { background: '#fff', borderRadius: '24px', padding: '36px 28px', maxWidth: '320px', width: '100%', textAlign: 'center' } },
        D({ style: { fontSize: '40px', marginBottom: '16px' } }, '🗑'),
        D({ style: { fontSize: '20px', fontWeight: '800', color: '#1e1b4b', marginBottom: '10px' } }, '"' + G.delConfirm + '" silinsin mi?'),
        D({ style: { color: '#6b7280', fontSize: '14px', marginBottom: '28px' } }, 'Bu işlem geri alınamaz.'),
        D({ style: { display: 'flex', gap: '12px' } },
          B({ style: { flex: '1', padding: '14px', borderRadius: '14px', background: '#f3f4f6', color: '#374151', fontSize: '15px', fontWeight: '600' }, onClick: () => { G.delConfirm = null; goScreen('menu'); } }, 'İptal'),
          B({ style: { flex: '1', padding: '14px', borderRadius: '14px', background: '#ef4444', color: '#fff', fontSize: '15px', fontWeight: '700' }, onClick: () => { const u = Object.assign({}, G.created); delete u[G.delConfirm]; G.created = u; saveCreated(u); if (G.selCat === G.delConfirm) G.selCat = null; G.delConfirm = null; goScreen('menu'); } }, 'Sil')
        )
      )
    );
    wrap.appendChild(modal);
  }

  return wrap;
}

// ════════════════════════════════════════════
// MAIN RENDER
// ════════════════════════════════════════════
function render() {
  const root = document.getElementById('root');
  root.innerHTML = '';
  const scr = G.screen;
  if      (scr === 'waitLand')  root.appendChild(screenWaitLand());
  else if (scr === 'countdown') root.appendChild(screenCountdown());
  else if (scr === 'paused')    root.appendChild(screenPaused());
  else if (scr === 'playing')   root.appendChild(screenPlaying());
  else if (scr === 'result')    root.appendChild(screenResult());
  else if (scr === 'create')    root.appendChild(screenCreate());
  else                          root.appendChild(screenMenu());
}

// Keyboard for desktop testing
window.addEventListener('keydown', e => {
  if (G.screen !== 'playing') return;
  if (e.key === 'ArrowUp') doCorrect();
  if (e.key === 'ArrowDown') doPass();
});

render();
</script>
</body>
</html>
