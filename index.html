const TIMERS = [30, 60, 90];
const REFILL = 10;
const CD_FROM = 5;
const DEFAULT_CAT = '🎬 Film & Dizi';
const DEFAULT_TIMER = 30;

// ── Storage ───────────────────────────────────────────────
function todayKey() { const d = new Date(); return d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate(); }
function getUsed(cat) { try { return JSON.parse(localStorage.getItem('hu_'+cat+'_'+todayKey())||'[]'); } catch { return []; } }
function markUsed(cat,words) { try { const e=getUsed(cat); localStorage.setItem('hu_'+cat+'_'+todayKey(),JSON.stringify([...new Set([...e,...words])])); } catch {} }
function loadCreated() { try { return JSON.parse(localStorage.getItem('hu_created')||'{}'); } catch { return {}; } }
function saveCreated(obj) { try { localStorage.setItem('hu_created',JSON.stringify(obj)); } catch {} }
function allCats() { return Object.assign({},CATS,G.created); }

function buildDeck(cat) {
  const all = allCats()[cat]||[];
  const used = getUsed(cat);
  let av = all.filter(w=>!used.includes(w));
  if (av.length<=REFILL) { av=all.slice(); localStorage.removeItem('hu_'+cat+'_'+todayKey()); }
  return av.sort(()=>Math.random()-.5);
}
function remText(cat) {
  const all=allCats()[cat]||[];
  const r=all.filter(w=>!getUsed(cat).includes(w)).length;
  return r<=REFILL ? {t:'🔄 Sıfırlandı',c:'#fbbf24'} : {t:r+'/'+all.length+' kelime',c:'#a5b4fc'};
}

// ── State ─────────────────────────────────────────────────
const G = {
  screen: 'menu',
  created: loadCreated(),
  selCat: DEFAULT_CAT,
  selTimer: DEFAULT_TIMER,
  deck: [], idx: 0,
  correct: 0, passed: 0, results: [],
  timeLeft: 0, countdown: CD_FROM,
  editKey: null, newCat: '', newWords: [],
  delConfirm: null,
};

// ── Orientation ───────────────────────────────────────────
let lastBeta = null;
let lastGamma = null;
let tiltCooldown = false;

function isLandscape(b,g) { return g!==null && Math.abs(g)>75; }
function isPortrait(b,g)  { return b!==null && Math.abs(90-b)<20; }
function isTiltedUp(b,g)  { if(b===null||g===null)return false; return (g>=0?b:-b) < -50; }
function isTiltedDown(b,g){ if(b===null||g===null)return false; return (g>=0?b:-b) > 50; }

function onOrient(e) {
  const beta=e.beta, gamma=e.gamma;
  lastBeta=beta; lastGamma=gamma;

  // Debug: waitLand ekranında değerleri göster
  if (G.screen==='waitLand') {
    const dbg=document.getElementById('debugBox');
    if (dbg) {
      const land=isLandscape(beta,gamma);
      dbg.innerHTML='beta: '+(beta!==null?Math.round(beta):'null')+'<br>gamma: '+(gamma!==null?Math.round(gamma):'null')+'<br>landscape: '+land;
      if (land) { startCountdown(); return; }
    }
  }

  if (G.screen==='playing' && isPortrait(beta,gamma)) { pauseGame(); return; }
  if (G.screen==='paused'  && isLandscape(beta,gamma)) { resumeGame(); return; }
  if (G.screen!=='playing' || tiltCooldown) return;
  if (beta===null||gamma===null) return;

  if (isTiltedUp(beta,gamma)) {
    tiltCooldown=true; doCorrect(); setTimeout(()=>{tiltCooldown=false;},1400);
  } else if (isTiltedDown(beta,gamma)) {
    tiltCooldown=true; doPass(); setTimeout(()=>{tiltCooldown=false;},1400);
  }
}

// Sensörü hemen kaydet (iOS dışı için) — iOS için startGame'de requestPermission
window.addEventListener('deviceorientation', onOrient, true);

// ── Timers ────────────────────────────────────────────────
let gameTimerInterval = null;
let countdownInterval = null;

function startGameTimer() {
  clearInterval(gameTimerInterval);
  gameTimerInterval = setInterval(()=>{
    if (G.screen!=='playing') { clearInterval(gameTimerInterval); return; }
    G.timeLeft--;
    updateTimerUI();
    if (G.timeLeft<=0) { clearInterval(gameTimerInterval); goScreen('result'); }
  },1000);
}
function stopGameTimer() { clearInterval(gameTimerInterval); }

function startCountdown() {
  clearInterval(countdownInterval);
  G.countdown=CD_FROM;
  goScreen('countdown');
  countdownInterval=setInterval(()=>{
    G.countdown--;
    const el=document.getElementById('cdNum');
    if (el) el.textContent=G.countdown;
    if (G.countdown<=0) { clearInterval(countdownInterval); goScreen('playing'); startGameTimer(); }
  },1000);
}
function pauseGame()  { stopGameTimer(); goScreen('paused'); }
function resumeGame() { goScreen('playing'); startGameTimer(); }

// ── Game actions ──────────────────────────────────────────
let flashTimeout=null;
function doCorrect() { const w=G.deck[G.idx]; if(w){G.correct++;G.results.push({word:w,r:'correct'});markUsed(G.selCat,[w]);} G.idx++; showFlash('correct'); }
function doPass()    { const w=G.deck[G.idx]; if(w){G.passed++;G.results.push({word:w,r:'pass'});}         G.idx++; showFlash('pass'); }

function showFlash(type) {
  const bg=document.getElementById('playBg');
  if (bg) bg.style.background=type==='correct'?'#16a34a':'#dc2626';
  updateWordUI(); updateScoreUI();
  clearTimeout(flashTimeout);
  flashTimeout=setTimeout(()=>{ if(document.getElementById('playBg'))document.getElementById('playBg').style.background='#1e1b4b'; },500);
}
function updateTimerUI() {
  const bar=document.getElementById('tBar'), lbl=document.getElementById('tLbl');
  if (!bar||!lbl) return;
  const pct=(G.timeLeft/G.selTimer)*100;
  const c=G.timeLeft<=10?'#ef4444':G.timeLeft<=20?'#f97316':'#22c55e';
  bar.style.width=pct+'%'; bar.style.background=c;
  lbl.textContent=G.timeLeft+'s'; lbl.style.color=c;
}
function updateWordUI() {
  const el=document.getElementById('wordTxt'); if(!el)return;
  const w=G.deck[G.idx]||null;
  el.textContent=w||'🎉 Kartlar bitti!';
  el.style.fontSize=w?'34px':'22px';
  el.style.color=w?'#1e1b4b':'#6b7280';
}
function updateScoreUI() {
  const c=document.getElementById('sC'), p=document.getElementById('sP');
  if(c)c.textContent='✅ '+G.correct;
  if(p)p.textContent='⏭ '+G.passed;
}

// ── Routing ───────────────────────────────────────────────
function goScreen(name) { G.screen=name; render(); }

function startGame() {
  if (!G.selCat) return;
  G.deck=buildDeck(G.selCat);
  G.idx=0; G.correct=0; G.passed=0; G.results=[];
  G.timeLeft=G.selTimer;
  stopGameTimer(); clearInterval(countdownInterval);

  // iOS 13+ izin
  if (typeof DeviceOrientationEvent!=='undefined' && typeof DeviceOrientationEvent.requestPermission==='function') {
    DeviceOrientationEvent.requestPermission().then(r=>{
      if (r==='granted') {
        // İzin verildikten sonra listener'ı yeniden ekle
        window.removeEventListener('deviceorientation', onOrient, true);
        window.addEventListener('deviceorientation', onOrient, true);
      }
      setTimeout(()=>{
        if (lastGamma!==null && isLandscape(lastBeta,lastGamma)) startCountdown();
        else goScreen('waitLand');
      },300);
    }).catch(err=>{ alert('Hata: '+err); goScreen('waitLand'); });
  } else {
    if (lastGamma!==null && isLandscape(lastBeta,lastGamma)) startCountdown();
    else goScreen('waitLand');
  }
}

// ── DOM helpers ───────────────────────────────────────────
function el(tag,attrs,...children) {
  const e=document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})) {
    if (k==='style'&&typeof v==='object') Object.assign(e.style,v);
    else if (k==='onClick') e.addEventListener('click',v);
    else e.setAttribute(k,v);
  }
  for (const c of children.flat()) {
    if (c==null) continue;
    e.appendChild(c instanceof Node?c:document.createTextNode(String(c)));
  }
  return e;
}
const D=(a,...c)=>el('div',a,...c);
const B=(a,...c)=>el('button',a,...c);
const S=(a,...c)=>el('span',a,...c);
const I=a=>el('input',a);

function screenCreate() {
  const canSave=G.newCat.trim()&&G.newWords.length>0;
  const catInput=I({value:G.newCat,placeholder:'ör. Türk Oyuncular',style:{width:'100%',padding:'12px 16px',borderRadius:'12px',border:'1.5px solid #e5e7eb',fontSize:'16px',marginTop:'8px',marginBottom:'20px',display:'block'}});
  catInput.addEventListener('input',e=>{G.newCat=e.target.value;});
  const wInput=I({value:'',placeholder:'Kelime yaz, Enter veya Ekle',style:{flex:'1',padding:'12px 16px',borderRadius:'12px',border:'1.5px solid #e5e7eb',fontSize:'16px'}});
  const chipsBox=D({style:{display:'flex',flexWrap:'wrap',gap:'8px',minHeight:'48px',marginBottom:'28px',padding:'4px 0'}});
  function rebuildChips(){
    chipsBox.innerHTML='';
    if(!G.newWords.length){chipsBox.appendChild(S({style:{color:'#d1d5db',fontSize:'14px'}},'Henüz kelime yok...'));return;}
    G.newWords.forEach(w=>{
      const chip=S({style:{background:'#ede9fe',color:'#4f46e5',borderRadius:'99px',padding:'7px 14px',fontSize:'14px',fontWeight:'600',display:'inline-flex',alignItems:'center',gap:'6px'}},
        w,S({style:{cursor:'pointer',color:'#7c3aed',fontWeight:'900',fontSize:'16px'},onClick:()=>{G.newWords=G.newWords.filter(x=>x!==w);rebuildChips();}},'×')
      );
      chipsBox.appendChild(chip);
    });
  }
  rebuildChips();
  function addWord(){const w=wInput.value.trim();if(w&&!G.newWords.includes(w)){G.newWords.push(w);wInput.value='';rebuildChips();}else wInput.value='';}
  wInput.addEventListener('keydown',e=>{if(e.key==='Enter')addWord();});
  return D({style:{minHeight:'100vh',background:'#f8fafc',padding:'28px 16px'}},
    D({style:{maxWidth:'440px',margin:'0 auto'}},
      B({style:{background:'none',color:'#4f46e5',fontSize:'15px',marginBottom:'20px',padding:'0',fontWeight:'600'},onClick:()=>goScreen('menu')},'← Geri'),
      D({style:{fontSize:'26px',fontWeight:'800',color:'#1e1b4b',marginBottom:'24px'}},G.editKey?'✏️ Düzenle':'✏️ Oyun Oluştur'),
      D({style:{fontSize:'12px',color:'#6b7280',fontWeight:'700',letterSpacing:'1px'}},'KATEGORİ ADI'),
      catInput,
      D({style:{fontSize:'12px',color:'#6b7280',fontWeight:'700',letterSpacing:'1px'}},'KELİMELER ('+G.newWords.length+')'),
      D({style:{display:'flex',gap:'10px',margin:'10px 0 14px'}},wInput,B({style:{padding:'12px 18px',borderRadius:'12px',background:'#4f46e5',color:'#fff',fontWeight:'700',fontSize:'15px'},onClick:addWord},'Ekle')),
      chipsBox,
      B({style:{width:'100%',padding:'16px',borderRadius:'16px',background:canSave?'#4f46e5':'#e5e7eb',color:canSave?'#fff':'#9ca3af',fontSize:'16px',fontWeight:'700'},onClick:()=>{
        const key=G.newCat.trim();if(!key||!G.newWords.length)return;
        const u=Object.assign({},G.created);
        if(G.editKey&&G.editKey!==key)delete u[G.editKey];
        u[key]=G.newWords.slice();G.created=u;saveCreated(u);
        if(G.selCat===G.editKey)G.selCat=key;
        G.editKey=null;G.newCat='';G.newWords=[];goScreen('menu');
      }},'💾 Kaydet')
    )
  );
}

function screenMenu() {
  const ac=allCats(), crKeys=Object.keys(G.created);
  const timerRow=D({style:{display:'flex',gap:'10px'}},
    ...TIMERS.map(t=>B({style:{flex:'1',padding:'12px 0',borderRadius:'14px',border:G.selTimer===t?'2px solid #818cf8':'2px solid transparent',background:G.selTimer===t?'#4f46e5':'rgba(255,255,255,.13)',color:'#fff',fontSize:'17px',fontWeight:'700'},onClick:()=>{G.selTimer=t;goScreen('menu');}},t+'s'))
  );
  const defList=D({},
    ...Object.keys(CATS).map(cat=>{
      const ri=remText(cat);
      return B({style:{width:'100%',padding:'16px 20px',borderRadius:'18px',background:G.selCat===cat?'#4f46e5':'rgba(255,255,255,.11)',border:G.selCat===cat?'2px solid #818cf8':'2px solid transparent',color:'#fff',fontSize:'15px',fontWeight:'600',textAlign:'left',display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'},onClick:()=>{G.selCat=cat;goScreen('menu');}},
        S({},cat),S({style:{fontSize:'11px',color:ri.c}},ri.t)
      );
    })
  );
  const crSection=crKeys.length?D({},
    D({style:{color:'#86efac',fontSize:'12px',fontWeight:'700',letterSpacing:'1.5px',marginBottom:'10px',marginTop:'6px'}},'🛠 OLUŞTURULAN OYUNLAR'),
    ...crKeys.map(cat=>{
      const ri=remText(cat);
      return D({style:{borderRadius:'18px',overflow:'hidden',border:G.selCat===cat?'2px solid #4ade80':'2px solid transparent',marginBottom:'10px'}},
        B({style:{width:'100%',padding:'16px 20px',background:G.selCat===cat?'#16a34a':'rgba(255,255,255,.11)',color:'#fff',fontSize:'15px',fontWeight:'600',textAlign:'left',display:'flex',justifyContent:'space-between',alignItems:'center'},onClick:()=>{G.selCat=cat;goScreen('menu');}},S({},cat),S({style:{fontSize:'11px',color:ri.c}},ri.t)),
        D({style:{display:'flex',background:'rgba(255,255,255,.07)'}},
          B({style:{flex:'1',padding:'10px 0',background:'none',borderRight:'1px solid rgba(255,255,255,.1)',color:'#a5b4fc',fontSize:'13px',fontWeight:'600'},onClick:()=>{G.editKey=cat;G.newCat=cat;G.newWords=G.created[cat].slice();goScreen('create');}},'✏️ Düzenle'),
          B({style:{flex:'1',padding:'10px 0',background:'none',color:'#fca5a5',fontSize:'13px',fontWeight:'600'},onClick:()=>{G.delConfirm=cat;goScreen('menu');}},'🗑 Sil')
        )
      );
    })
  ):null;

  const wrap=D({style:{minHeight:'100vh',background:'linear-gradient(160deg,#1e1b4b 0%,#312e81 55%,#4f46e5 100%)',padding:'36px 16px'}},
    D({style:{maxWidth:'440px',margin:'0 auto'}},
      D({style:{textAlign:'center',marginBottom:'32px'}},
        D({style:{fontSize:'52px'}},'🎯'),
        D({style:{fontSize:'34px',fontWeight:'900',color:'#fff',margin:'8px 0 4px'}},'Heads Up!'),
        D({style:{color:'#a5b4fc',fontSize:'15px'}},'📱 Telefonu yan çevir ve alnına tut!'),
        D({style:{color:'#ffffff30',fontSize:'11px',marginTop:'4px'}},VERSION)
      ),
      D({style:{background:'rgba(255,255,255,.12)',borderRadius:'20px',padding:'18px 20px',marginBottom:'24px'}},
        D({style:{color:'#c7d2fe',fontSize:'11px',fontWeight:'700',letterSpacing:'2px',marginBottom:'12px'}},'⏱ SÜRE'),
        timerRow
      ),
      D({style:{color:'#c7d2fe',fontSize:'11px',fontWeight:'700',letterSpacing:'2px',marginBottom:'12px'}},'📂 KATEGORİLER'),
      defList,
      crSection,
      B({style:{width:'100%',padding:'20px',borderRadius:'20px',background:G.selCat?'#818cf8':'rgba(255,255,255,.13)',color:G.selCat?'#fff':'rgba(255,255,255,.35)',fontSize:'18px',fontWeight:'800',marginTop:'8px',marginBottom:'12px'},onClick:startGame},
        G.selCat?'▶ Başla — '+G.selCat:'Önce kategori seç'
      ),
      B({style:{width:'100%',padding:'16px',borderRadius:'20px',background:'rgba(255,255,255,.1)',border:'2px solid rgba(255,255,255,.2)',color:'#fff',fontSize:'16px',fontWeight:'700'},onClick:()=>{G.editKey=null;G.newCat='';G.newWords=[];goScreen('create');}},'✏️ Oyun Oluştur')
    )
  );

  if (G.delConfirm) {
    wrap.appendChild(D({style:{position:'fixed',inset:'0',background:'rgba(0,0,0,.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:'999',padding:'24px'}},
      D({style:{background:'#fff',borderRadius:'24px',padding:'36px 28px',maxWidth:'320px',width:'100%',textAlign:'center'}},
        D({style:{fontSize:'40px',marginBottom:'16px'}},'🗑'),
        D({style:{fontSize:'20px',fontWeight:'800',color:'#1e1b4b',marginBottom:'10px'}},'"'+G.delConfirm+'" silinsin mi?'),
        D({style:{color:'#6b7280',fontSize:'14px',marginBottom:'28px'}},'Bu işlem geri alınamaz.'),
        D({style:{display:'flex',gap:'12px'}},
          B({style:{flex:'1',padding:'14px',borderRadius:'14px',background:'#f3f4f6',color:'#374151',fontSize:'15px',fontWeight:'600'},onClick:()=>{G.delConfirm=null;goScreen('menu');}},'İptal'),
          B({style:{flex:'1',padding:'14px',borderRadius:'14px',background:'#ef4444',color:'#fff',fontSize:'15px',fontWeight:'700'},onClick:()=>{const u=Object.assign({},G.created);delete u[G.delConfirm];G.created=u;saveCreated(u);if(G.selCat===G.delConfirm)G.selCat=null;G.delConfirm=null;goScreen('menu');}},'Sil')
        )
      )
    ));
  }
  return wrap;
}

// ── Main render ───────────────────────────────────────────
function render() {
  const root=document.getElementById('root');
  root.innerHTML='';
  const s=G.screen;
  if      (s==='waitLand')  root.appendChild(screenWaitLand());
  else if (s==='countdown') root.appendChild(screenCountdown());
  else if (s==='paused')    root.appendChild(screenPaused());
  else if (s==='playing')   root.appendChild(screenPlaying());
  else if (s==='result')    root.appendChild(screenResult());
  else if (s==='create')    root.appendChild(screenCreate());
  else                      root.appendChild(screenMenu());
}

// Keyboard (masaüstü test)
window.addEventListener('keydown',e=>{
  if(G.screen!=='playing')return;
  if(e.key==='ArrowUp')doCorrect();
  if(e.key==='ArrowDown')doPass();
});

render();
</script>
</body>
</html>
