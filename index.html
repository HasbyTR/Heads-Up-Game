const TIMERS=[30,60,90];
const REFILL=10;
const COUNTDOWN_FROM=5;

function shuffle(a){return[...a].sort(()=>Math.random()-.5);}
function todayKey(){const d=new Date();return`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;}
function getUsed(cat){try{const r=localStorage.getItem(`hu_used_${cat}_${todayKey()}`);return r?JSON.parse(r):[];}catch{return[];}}
function addUsed(cat,words){try{const e=getUsed(cat);localStorage.setItem(`hu_used_${cat}_${todayKey()}`,JSON.stringify([...new Set([...e,...words])]));}catch{}}
function loadCreated(){try{const s=localStorage.getItem("headsup_created");return s?JSON.parse(s):{};}catch{return{};}}
function saveCreatedLS(o){try{localStorage.setItem("headsup_created",JSON.stringify(o));}catch{}}
function buildDeck(cat,all){const a=all[cat]||[];const u=getUsed(cat);let av=a.filter(w=>!u.includes(w));if(av.length<=REFILL){av=[...a];localStorage.removeItem(`hu_used_${cat}_${todayKey()}`);}return shuffle(av);}
function remInfo(cat,all){const a=all[cat]||[];const r=a.filter(w=>!getUsed(cat).includes(w)).length;if(r<=REFILL)return{text:"🔄 Sıfırlandı",color:"#fbbf24"};return{text:`${r}/${a.length} kelime`,color:"#a5b4fc"};}
function isLand(g){return g!==null&&(g>60||g<-60);}

// ── State ─────────────────────────────────────────────────
let S={
  screen:"menu", // menu|countdown|playing|paused|result|create
  created:loadCreated(),
  selCat:null, selTimer:60,
  editKey:null, createCat:"", createWords:[], wordInput:"",
  confirmDelete:null,
  deck:[], cardIdx:0, timeLeft:0, correct:0, passed:0, flash:null,
  roundResults:[], countdown:COUNTDOWN_FROM,
  landscape:false,
  timerIv:null, countdownIv:null, flashT:null,
};
function allCats(){return{...DEFAULT_CATEGORIES,...S.created};}
function set(patch){
  const p=typeof patch==="function"?patch(S):patch;
  Object.assign(S,p);
  render();
}

// ── Orientation ───────────────────────────────────────────
let tiltLocked=false;
function onOrient(e){
  const g=e.gamma;
  const land=isLand(g);
  const prev=S.landscape;
  S.landscape=land;

  if(S.screen==="playing"&&!land){
    clearInterval(S.timerIv);
    set({screen:"paused",landscape:land});
    return;
  }
  if(S.screen==="paused"&&land){
    set({screen:"playing",landscape:land});
    return;
  }
  if(S.screen==="playing"&&land&&!tiltLocked){
    let doC=false,doP=false;
    if(g>0){if(g>75)doC=true;else if(g<72&&g>62)doP=true;}
    else{if(g<-75)doC=true;else if(g>-72&&g<-62)doP=true;}
    if(doC){tiltLocked=true;doCorrect();setTimeout(()=>{tiltLocked=false;},1200);}
    else if(doP){tiltLocked=true;doPass();setTimeout(()=>{tiltLocked=false;},1200);}
  }
  if(prev!==land)set({landscape:land});
}

function initOrient(){
  if(typeof DeviceOrientationEvent!=="undefined"&&typeof DeviceOrientationEvent.requestPermission==="function"){
    DeviceOrientationEvent.requestPermission().then(r=>{
      if(r==="granted")window.addEventListener("deviceorientation",onOrient,true);
      startCountdown();
    }).catch(()=>startCountdown());
  } else {
    window.addEventListener("deviceorientation",onOrient,true);
    startCountdown();
  }
}

// ── Timer ─────────────────────────────────────────────────
function startGameTimer(){
  clearInterval(S.timerIv);
  const iv=setInterval(()=>{
    if(S.screen!=="playing"){clearInterval(iv);return;}
    set(s=>{
      if(s.timeLeft<=1){clearInterval(iv);return{timeLeft:0,screen:"result",timerIv:null};}
      return{timeLeft:s.timeLeft-1};
    });
  },1000);
  set({timerIv:iv});
}

// Watch for playing screen start (after paused resume)
let lastScreen="";
function onScreenChange(scr){
  if(scr==="playing"&&lastScreen!=="playing")startGameTimer();
  lastScreen=scr;
}

// ── Countdown ─────────────────────────────────────────────
function startCountdown(){
  set({screen:"countdown",countdown:COUNTDOWN_FROM});
  let c=COUNTDOWN_FROM;
  const iv=setInterval(()=>{
    c--;
    if(c<=0){clearInterval(iv);set({screen:"playing",countdownIv:null});startGameTimer();}
    else set({countdown:c});
  },1000);
  set({countdownIv:iv});
}

// ── Game Actions ──────────────────────────────────────────
function doCorrect(){
  const word=S.deck[S.cardIdx];
  if(word){addUsed(S.selCat,[word]);set(s=>({correct:s.correct+1,roundResults:[...s.roundResults,{word,result:"correct"}],cardIdx:s.cardIdx+1}));}
  else set(s=>({cardIdx:s.cardIdx+1}));
  flash("correct");
}
function doPass(){
  const word=S.deck[S.cardIdx];
  if(word)set(s=>({passed:s.passed+1,roundResults:[...s.roundResults,{word,result:"pass"}],cardIdx:s.cardIdx+1}));
  else set(s=>({cardIdx:s.cardIdx+1}));
  flash("pass");
}
function flash(type){
  clearTimeout(S.flashT);
  const t=setTimeout(()=>set({flash:null}),600);
  set({flash:type,flashT:t});
}
function startGame(){
  if(!S.selCat)return;
  const deck=buildDeck(S.selCat,allCats());
  set({deck,cardIdx:0,correct:0,passed:0,roundResults:[],timeLeft:S.selTimer,flash:null});
  initOrient();
}
function saveGame(){
  const key=S.createCat.trim();if(!key||S.createWords.length===0)return;
  const u={...S.created};if(S.editKey&&S.editKey!==key)delete u[S.editKey];
  u[key]=S.createWords;saveCreatedLS(u);
  set({created:u,screen:"menu",editKey:null,createCat:"",createWords:[],wordInput:""});
}
function deleteGame(key){
  const u={...S.created};delete u[key];saveCreatedLS(u);
  set({created:u,confirmDelete:null,selCat:S.selCat===key?null:S.selCat});
}
function addWord(){
  const w=S.wordInput.trim();
  if(w&&!S.createWords.includes(w))set(s=>({createWords:[...s.createWords,w],wordInput:""}));
  else set({wordInput:""});
}
function removeWord(w){set(s=>({createWords:s.createWords.filter(x=>x!==w)}));}

// ── DOM helpers ───────────────────────────────────────────
function h(tag,attrs,children){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  for(const c of(children||[])){
    if(c==null)continue;
    if(typeof c==="string"||typeof c==="number")e.appendChild(document.createTextNode(String(c)));
    else if(c instanceof Node)e.appendChild(c);
  }
  return e;
}
const div=(a,c)=>h("div",a,c);
const btn=(a,c)=>h("button",a,c);
const inp=a=>h("input",a);
const span=(a,c)=>h("span",a,c);

      div({style:{fontSize:"18px",color:"#a5b4fc",fontWeight:"700",marginBottom:"24px",letterSpacing:"3px"}},["HAZIR OLUN!"]),
      div({style:{fontSize:"120px",fontWeight:"900",color:"#fff",lineHeight:"1",textShadow:"0 4px 32px rgba(0,0,0,.5)",animation:"pulse 1s ease-in-out infinite"}},[ S.countdown]),
      div({style:{fontSize:"15px",color:"#a5b4fc",marginTop:"32px"}},[S.selCat])
    ])
  ]);
}

function renderPaused(){
  const tc=S.timeLeft<=10?"#ef4444":S.timeLeft<=20?"#f97316":"#22c55e";
  return div({style:{minHeight:"100vh",background:"#0f172a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",userSelect:"none"}},[
    div({style:{textAlign:"center"}},[
      div({style:{fontSize:"64px",marginBottom:"16px"}},["⏸"]),
      div({style:{fontSize:"28px",fontWeight:"900",color:"#fff",marginBottom:"12px"}},["Duraklatıldı"]),
      div({style:{fontSize:"15px",color:"#94a3b8",marginBottom:"8px"}},["Telefonu yan çevir → devam eder"]),
      div({style:{fontSize:"13px",color:"#475569",marginTop:"24px"}},["Kalan süre: ",span({style:{color:tc,fontWeight:"700"}},[S.timeLeft+"s"])])
    ])
  ]);
}

function renderPlaying(){
  const{correct,passed,timeLeft,selTimer,flash:fl,selCat,deck,cardIdx}=S;
  const bg=fl==="correct"?"#16a34a":fl==="pass"?"#dc2626":"#1e1b4b";
  const pct=(timeLeft/selTimer)*100;
  const tc=timeLeft<=10?"#ef4444":timeLeft<=20?"#f97316":"#22c55e";
  const word=deck[cardIdx]||null;
  return div({style:{minHeight:"100vh",background:bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"space-between",padding:"env(safe-area-inset-top,24px) 16px 28px",transition:"background .3s",userSelect:"none"}},[
    div({style:{width:"100%",maxWidth:"400px"}},[
      div({style:{display:"flex",justifyContent:"space-between",color:"#fff",marginBottom:"6px",fontSize:"14px"}},[
        span({},["✅ "+correct]),
        span({style:{fontSize:"22px",fontWeight:"700",color:tc}},[timeLeft+"s"]),
        span({},["⏭ "+passed])
      ]),
      div({style:{background:"#ffffff33",borderRadius:"99px",height:"8px",overflow:"hidden"}},[
        div({style:{height:"100%",width:pct+"%",background:tc,borderRadius:"99px",transition:"width 1s linear"}},[])
      ])
    ]),
    div({style:{flex:"1",display:"flex",alignItems:"center",justifyContent:"center",width:"100%",maxWidth:"400px"}},[
      div({style:{background:"#fff",borderRadius:"24px",padding:"40px 24px",textAlign:"center",width:"100%",boxShadow:"0 8px 32px rgba(0,0,0,.25)",animation:"fadeIn .25s ease"}},[
        div({style:{fontSize:"11px",color:"#6b7280",marginBottom:"8px",letterSpacing:"2px",textTransform:"uppercase"}},[selCat]),
        word
          ? div({style:{fontSize:"34px",fontWeight:"800",color:"#1e1b4b",lineHeight:"1.2",minHeight:"80px",display:"flex",alignItems:"center",justifyContent:"center"}},[word])
          : div({style:{fontSize:"26px",fontWeight:"800",color:"#6b7280",minHeight:"80px",display:"flex",alignItems:"center",justifyContent:"center"}},["🎉 Kartlar bitti!"])
      ])
    ]),
    div({style:{width:"100%",maxWidth:"400px"}},[
      div({style:{color:"#ffffffaa",textAlign:"center",fontSize:"12px",marginBottom:"10px"}},["Ekran YUKARI → ✅ Doğru  ·  Ekran AŞAĞI → ⏭ Pas"]),
      div({style:{display:"flex",gap:"12px"}},[
        btn({style:{flex:"1",padding:"20px 0",borderRadius:"16px",background:"#ef4444",border:"none",color:"#fff",fontSize:"18px",fontWeight:"700"},onClick:doPass},["⬇ Pas"]),
        btn({style:{flex:"1",padding:"20px 0",borderRadius:"16px",background:"#22c55e",border:"none",color:"#fff",fontSize:"18px",fontWeight:"700"},onClick:doCorrect},["⬆ Doğru"])
      ])
    ])
  ]);
}

function renderResult(){
  const{correct,passed,selCat,roundResults}=S;
  const items=roundResults.map(r=>
    div({style:{display:"flex",alignItems:"center",justifyContent:"space-between",background:r.result==="correct"?"#f0fdf4":"#fef2f2",borderRadius:"10px",padding:"8px 14px"}},[
      span({style:{fontWeight:"600",color:"#1e1b4b",fontSize:"15px"}},[r.word]),
      span({style:{fontSize:"18px"}},[r.result==="correct"?"✅":"⏭"])
    ])
  );
  return div({style:{minHeight:"100vh",background:"linear-gradient(135deg,#1e1b4b,#312e81)",padding:"32px 16px",display:"flex",flexDirection:"column",alignItems:"center"}},[
    div({style:{background:"#fff",borderRadius:"28px",padding:"32px 24px",maxWidth:"400px",width:"100%",boxShadow:"0 8px 40px rgba(0,0,0,.4)"}},[
      div({style:{textAlign:"center",marginBottom:"20px"}},[
        div({style:{fontSize:"48px"}},["🎉"]),
        div({style:{fontSize:"26px",fontWeight:"800",color:"#1e1b4b",margin:"8px 0 2px"}},["Süre Doldu!"]),
        div({style:{color:"#6b7280"}},[selCat])
      ]),
      div({style:{display:"flex",gap:"12px",justifyContent:"center",marginBottom:"20px"}},[
        div({style:{background:"#f0fdf4",borderRadius:"16px",padding:"16px 24px",textAlign:"center"}},[
          div({style:{fontSize:"36px",fontWeight:"800",color:"#16a34a"}},[String(correct)]),
          div({style:{fontSize:"13px",color:"#16a34a"}},["Doğru"])
        ]),
        div({style:{background:"#fef2f2",borderRadius:"16px",padding:"16px 24px",textAlign:"center"}},[
          div({style:{fontSize:"36px",fontWeight:"800",color:"#dc2626"}},[String(passed)]),
          div({style:{fontSize:"13px",color:"#dc2626"}},["Pas"])
        ])
      ]),
      items.length?div({style:{marginBottom:"20px"}},[
        div({style:{fontSize:"12px",fontWeight:"700",color:"#6b7280",letterSpacing:"1.5px",marginBottom:"10px"}},["BU TURDAKİ KELİMELER"]),
        div({style:{display:"flex",flexDirection:"column",gap:"6px",maxHeight:"220px",overflowY:"auto"}},items)
      ]):null,
      btn({style:{width:"100%",padding:"14px 0",borderRadius:"14px",background:"#4f46e5",border:"none",color:"#fff",fontSize:"16px",fontWeight:"700",marginBottom:"10px"},onClick:startGame},["🔄 Tekrar Oyna"]),
      btn({style:{width:"100%",padding:"14px 0",borderRadius:"14px",background:"#f3f4f6",border:"none",color:"#374151",fontSize:"16px",fontWeight:"600"},onClick:()=>set({screen:"menu"})},["← Ana Menü"])
    ])
  ]);
}

function renderCreate(){
  const{createCat,createWords,wordInput,editKey}=S;
  const canSave=createCat.trim()&&createWords.length>0;
  const catInp=inp({value:createCat,placeholder:"ör. Türk Oyuncular",style:{width:"100%",padding:"10px 14px",borderRadius:"10px",border:"1.5px solid #e5e7eb",fontSize:"15px",outline:"none",marginTop:"8px",marginBottom:"20px"}});
  catInp.addEventListener("input",e=>{S.createCat=e.target.value;});
  const wInp=inp({value:wordInput,placeholder:"Kelime yaz, Enter veya Ekle",style:{flex:"1",padding:"10px 14px",borderRadius:"10px",border:"1.5px solid #e5e7eb",fontSize:"15px",outline:"none"}});
  wInp.addEventListener("input",e=>{S.wordInput=e.target.value;});
  wInp.addEventListener("keydown",e=>{if(e.key==="Enter")addWord();});
  const chips=createWords.map(w=>span({style:{background:"#ede9fe",color:"#4f46e5",borderRadius:"99px",padding:"6px 12px",fontSize:"14px",fontWeight:"600",display:"inline-flex",alignItems:"center",gap:"6px"}},[
    w,span({style:{cursor:"pointer",color:"#7c3aed",fontWeight:"900"},onClick:()=>removeWord(w)},["×"])
  ]));
  return div({style:{minHeight:"100vh",background:"#f9fafb",padding:"env(safe-area-inset-top,24px) 16px 24px"}},[
    div({style:{maxWidth:"420px",margin:"0 auto"}},[
      btn({style:{background:"none",border:"none",color:"#4f46e5",fontSize:"15px",marginBottom:"16px",padding:"0"},onClick:()=>set({screen:"menu"})},["← Geri"]),
      div({style:{fontSize:"26px",fontWeight:"800",color:"#1e1b4b",marginBottom:"20px"}},[editKey?"✏️ Düzenle":"✏️ Oyun Oluştur"]),
      div({style:{fontSize:"13px",color:"#6b7280",fontWeight:"600"}},["KATEGORİ ADI"]),
      catInp,
      div({style:{fontSize:"13px",color:"#6b7280",fontWeight:"600"}},["KELİMELER ("+createWords.length+")"]),
      div({style:{display:"flex",gap:"8px",margin:"8px 0 12px"}},[
        wInp,
        btn({style:{padding:"10px 16px",borderRadius:"10px",background:"#4f46e5",border:"none",color:"#fff",fontWeight:"700"},onClick:addWord},["Ekle"])
      ]),
      div({style:{display:"flex",flexWrap:"wrap",gap:"8px",minHeight:"40px",marginBottom:"28px"}},
        chips.length?chips:[span({style:{color:"#d1d5db",fontSize:"14px"}},["Henüz kelime yok..."])]
      ),
      btn({style:{width:"100%",padding:"15px 0",borderRadius:"14px",background:canSave?"#4f46e5":"#e5e7eb",border:"none",color:canSave?"#fff":"#9ca3af",fontSize:"16px",fontWeight:"700"},onClick:saveGame},["💾 Kaydet"])
    ])
  ]);
}

function renderMenu(){
  const{selCat,selTimer,created,confirmDelete,landscape}=S;
  const ac=allCats();
  const createdKeys=Object.keys(created);
  const timerBtns=TIMERS.map(t=>btn({
    style:{flex:"1",padding:"10px 0",borderRadius:"12px",border:selTimer===t?"2px solid #818cf8":"2px solid transparent",background:selTimer===t?"#4f46e5":"rgba(255,255,255,.13)",color:"#fff",fontSize:"16px",fontWeight:"700"},
    onClick:()=>set({selTimer:t})
  },[t+"s"]));
  const defBtns=Object.keys(DEFAULT_CATEGORIES).map(cat=>{
    const ri=remInfo(cat,ac);
    return btn({
      style:{padding:"16px 20px",borderRadius:"16px",background:selCat===cat?"#4f46e5":"rgba(255,255,255,.11)",border:selCat===cat?"2px solid #818cf8":"2px solid transparent",color:"#fff",fontSize:"15px",fontWeight:"600",textAlign:"left",width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center"},
      onClick:()=>set({selCat:cat})
    },[span({},[cat]),span({style:{fontSize:"11px",color:ri.color}},[ri.text])]);
  });
  const crBtns=createdKeys.map(cat=>{
    const ri=remInfo(cat,ac);
    return div({style:{borderRadius:"16px",overflow:"hidden",border:selCat===cat?"2px solid #4ade80":"2px solid transparent"}},[
      btn({style:{width:"100%",padding:"16px 20px",background:selCat===cat?"#16a34a":"rgba(255,255,255,.11)",border:"none",color:"#fff",fontSize:"15px",fontWeight:"600",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"},onClick:()=>set({selCat:cat})},[
        span({},[cat]),span({style:{fontSize:"11px",color:ri.color}},[ri.text])
      ]),
      div({style:{display:"flex",background:"rgba(255,255,255,.06)"}},[
        btn({style:{flex:"1",padding:"9px 0",background:"none",border:"none",borderRight:"1px solid rgba(255,255,255,.1)",color:"#a5b4fc",fontSize:"13px",fontWeight:"600"},onClick:()=>set({editKey:cat,createCat:cat,createWords:[...created[cat]],wordInput:"",screen:"create"})},["✏️ Düzenle"]),
        btn({style:{flex:"1",padding:"9px 0",background:"none",border:"none",color:"#fca5a5",fontSize:"13px",fontWeight:"600"},onClick:()=>set({confirmDelete:cat})},["🗑 Sil"])
      ])
    ]);
  });

  const el=div({style:{minHeight:"100vh",background:"linear-gradient(160deg,#1e1b4b 0%,#312e81 60%,#4f46e5 100%)",padding:"env(safe-area-inset-top,32px) 16px 32px"}},[
    div({style:{maxWidth:"420px",margin:"0 auto"}},[
      div({style:{textAlign:"center",marginBottom:"28px"}},[
        div({style:{fontSize:"48px"}},["🎯"]),
        div({style:{fontSize:"32px",fontWeight:"900",color:"#fff",margin:"8px 0 4px"}},["Heads Up!"]),
        div({style:{color:"#a5b4fc",fontSize:"15px"}},["📱 Telefonu yan çevir ve alnına tut!"])
      ]),
      div({style:{background:"rgba(255,255,255,.11)",borderRadius:"18px",padding:"16px 20px",marginBottom:"20px"}},[
        div({style:{color:"#c7d2fe",fontSize:"12px",fontWeight:"700",letterSpacing:"1.5px",marginBottom:"10px"}},["⏱ SÜRE"]),
        div({style:{display:"flex",gap:"10px"}},timerBtns)
      ]),
      div({style:{color:"#c7d2fe",fontSize:"12px",fontWeight:"700",letterSpacing:"1.5px",marginBottom:"10px"}},["📂 KATEGORİLER"]),
      div({style:{display:"flex",flexDirection:"column",gap:"10px",marginBottom:"20px"}},defBtns),
      ...(createdKeys.length?[
        div({style:{color:"#86efac",fontSize:"12px",fontWeight:"700",letterSpacing:"1.5px",marginBottom:"10px"}},["🛠 OLUŞTURULAN OYUNLAR"]),
        div({style:{display:"flex",flexDirection:"column",gap:"10px",marginBottom:"20px"}},crBtns)
      ]:[]),
      ...(selCat&&!landscape?[
        div({style:{background:"rgba(251,191,36,.13)",border:"1.5px solid #fbbf24",borderRadius:"14px",padding:"12px 16px",marginBottom:"12px",textAlign:"center",color:"#fbbf24",fontSize:"14px",fontWeight:"600"}},["📱 Başlamak için telefonu yan çevir"])
      ]:[]),
      btn({style:{width:"100%",padding:"18px 0",borderRadius:"18px",background:selCat?"#818cf8":"rgba(255,255,255,.13)",border:"none",color:selCat?"#fff":"rgba(255,255,255,.35)",fontSize:"18px",fontWeight:"800",marginBottom:"12px"},onClick:startGame},[selCat?"▶ Başla — "+selCat:"Önce kategori seç"]),
      btn({style:{width:"100%",padding:"15px 0",borderRadius:"18px",background:"rgba(255,255,255,.11)",border:"2px solid rgba(255,255,255,.2)",color:"#fff",fontSize:"16px",fontWeight:"700"},onClick:()=>set({editKey:null,createCat:"",createWords:[],wordInput:"",screen:"create"})},["✏️ Oyun Oluştur"])
    ])
  ]);

  if(confirmDelete){
    el.appendChild(div({style:{position:"fixed",inset:"0",background:"rgba(0,0,0,.65)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:"99",padding:"24px"}},[
      div({style:{background:"#fff",borderRadius:"24px",padding:"32px 24px",maxWidth:"320px",width:"100%",textAlign:"center"}},[
        div({style:{fontSize:"36px",marginBottom:"12px"}},["🗑"]),
        div({style:{fontSize:"20px",fontWeight:"800",color:"#1e1b4b",marginBottom:"8px"}},["\""+confirmDelete+"\" silinsin mi?"]),
        div({style:{color:"#6b7280",fontSize:"14px",marginBottom:"24px"}},["Bu işlem geri alınamaz."]),
        div({style:{display:"flex",gap:"10px"}},[
          btn({style:{flex:"1",padding:"12px 0",borderRadius:"12px",background:"#f3f4f6",border:"none",color:"#374151",fontSize:"15px",fontWeight:"600"},onClick:()=>set({confirmDelete:null})},["İptal"]),
          btn({style:{flex:"1",padding:"12px 0",borderRadius:"12px",background:"#ef4444",border:"none",color:"#fff",fontSize:"15px",fontWeight:"700"},onClick:()=>deleteGame(confirmDelete)},["Sil"])
        ])
      ])
    ]));
  }
  return el;
}

// ── Main render ───────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  onScreenChange(S.screen);
  if(S.screen==="countdown")app.appendChild(renderCountdown());
  else if(S.screen==="paused")app.appendChild(renderPaused());
  else if(S.screen==="playing")app.appendChild(renderPlaying());
  else if(S.screen==="result")app.appendChild(renderResult());
  else if(S.screen==="create")app.appendChild(renderCreate());
  else app.appendChild(renderMenu());
}

// Keyboard (masaüstü test için)
window.addEventListener("keydown",e=>{
  if(S.screen!=="playing")return;
  if(e.key==="ArrowUp")doCorrect();
  if(e.key==="ArrowDown")doPass();
});

render();
</script>
</body>
</html>
