const TIMERS=[30,60,90], REFILL=10, CD=5;

// ── Helpers ───────────────────────────────────────────────
const shuffle=a=>[...a].sort(()=>Math.random()-.5);
const todayKey=()=>{const d=new Date();return`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;};
const getUsed=cat=>{try{const r=localStorage.getItem(`hu_${cat}_${todayKey()}`);return r?JSON.parse(r):[];}catch{return[];}};
const addUsed=(cat,ws)=>{try{const e=getUsed(cat);localStorage.setItem(`hu_${cat}_${todayKey()}`,JSON.stringify([...new Set([...e,...ws])]));}catch{}};
const loadCreated=()=>{try{const s=localStorage.getItem("hu_created");return s?JSON.parse(s):{};}catch{return{};}};
const saveCreated=o=>{try{localStorage.setItem("hu_created",JSON.stringify(o));}catch{}};
const allCats=()=>({...CATS,...S.created});
const isLand=g=>g!==null&&Math.abs(g)>60;

function buildDeck(cat){
  const all=allCats()[cat]||[];
  const used=getUsed(cat);
  let av=all.filter(w=>!used.includes(w));
  if(av.length<=REFILL){av=[...all];localStorage.removeItem(`hu_${cat}_${todayKey()}`);}
  return shuffle(av);
}
function remInfo(cat){
  const all=allCats()[cat]||[];
  const r=all.filter(w=>!getUsed(cat).includes(w)).length;
  return r<=REFILL?{t:"🔄 Sıfırlandı",c:"#fbbf24"}:{t:`${r}/${all.length} kelime`,c:"#a5b4fc"};
}

// ── State ─────────────────────────────────────────────────
// screen: menu | waitLandscape | countdown | playing | paused | result | create
let S={
  screen:"menu", created:loadCreated(),
  selCat:null, selTimer:60,
  editKey:null, createCat:"", createWords:[], wordInput:"",
  confirmDelete:null,
  deck:[], idx:0, timeLeft:0, correct:0, passed:0,
  flash:null, results:[], countdown:CD,
  gamma:null,
  timerIv:null, countdownIv:null, flashT:null,
};

function set(patch){
  Object.assign(S, typeof patch==="function"?patch(S):patch);
  render();
}

// ── Orientation ───────────────────────────────────────────
let orientRegistered=false;

function onOrient(e){
  const g=e.gamma;
  S.gamma=g;
  const land=isLand(g);
  const scr=S.screen;

  if(scr==="waitLandscape"&&land){
    beginCountdown(); return;
  }
  if(scr==="playing"&&!land){
    clearInterval(S.timerIv);
    set({screen:"paused",gamma:g}); return;
  }
  if(scr==="paused"&&land){
    set({screen:"playing",gamma:g}); return;
  }
  if(scr==="playing"&&land&&!tiltLocked&&g!==null){
    let doC=false,doP=false;
    if(g>0){if(g>75)doC=true;else if(g>=62&&g<=72)doP=true;}
    else{if(g<-75)doC=true;else if(g<=-62&&g>=-72)doP=true;}
    if(doC){tiltLocked=true;doCorrect();setTimeout(()=>{tiltLocked=false;},1200);}
    else if(doP){tiltLocked=true;doPass();setTimeout(()=>{tiltLocked=false;},1200);}
  }
  // update gamma silently (no re-render needed just for gamma)
}

function registerOrient(){
  if(orientRegistered)return;
  orientRegistered=true;
  window.addEventListener("deviceorientation",onOrient,true);
}

// Register immediately on non-iOS or iOS without permission requirement
if(typeof DeviceOrientationEvent==="undefined"||typeof DeviceOrientationEvent.requestPermission!=="function"){
  registerOrient();
}

let tiltLocked=false;

// ── Game timer ────────────────────────────────────────────
function startTimer(){
  clearInterval(S.timerIv);
  const iv=setInterval(()=>{
    if(S.screen!=="playing"){clearInterval(iv);return;}
    if(S.timeLeft<=1){
      clearInterval(iv);
      set({screen:"result",timerIv:null,timeLeft:0});
    } else {
      S.timeLeft--;
      renderTimerBar(); // lightweight update
    }
  },1000);
  S.timerIv=iv;
}

// Watch for playing screen — restart timer after resume
let lastScreen="";
function onScreenChange(scr){
  if(scr==="playing"&&lastScreen!=="playing") startTimer();
  lastScreen=scr;
}

// ── Countdown ─────────────────────────────────────────────
function beginCountdown(){
  clearInterval(S.countdownIv);
  S.countdown=CD;
  S.screen="countdown";
  render();
  let c=CD;
  const iv=setInterval(()=>{
    c--;
    if(c<=0){clearInterval(iv);S.countdownIv=null;set({screen:"playing"});}
    else{S.countdown=c;renderCountdownNum();}
  },1000);
  S.countdownIv=iv;
}

// ── Actions ───────────────────────────────────────────────
function doCorrect(){
  const word=S.deck[S.idx];
  if(word){S.correct++;S.results.push({word,r:"correct"});addUsed(S.selCat,[word]);}
  S.idx++;
  doFlash("correct");
}
function doPass(){
  const word=S.deck[S.idx];
  if(word){S.passed++;S.results.push({word,r:"pass"});}
  S.idx++;
  doFlash("pass");
}
function doFlash(type){
  S.flash=type;
  clearTimeout(S.flashT);
  S.flashT=setTimeout(()=>{S.flash=null;renderFlash();},600);
  renderFlash();
  renderWord();
}

function startGame(){
  if(!S.selCat)return;
  const deck=buildDeck(S.selCat);
  Object.assign(S,{deck,idx:0,correct:0,passed:0,results:[],timeLeft:S.selTimer,flash:null});

  const go=()=>{
    // gamma null = sensor not yet read → safe default: waitLandscape
    if(S.gamma!==null&&isLand(S.gamma)){
      beginCountdown();
    } else {
      set({screen:"waitLandscape"});
    }
  };

  if(typeof DeviceOrientationEvent!=="undefined"&&typeof DeviceOrientationEvent.requestPermission==="function"){
    DeviceOrientationEvent.requestPermission().then(r=>{
      if(r==="granted")registerOrient();
      go();
    }).catch(()=>go());
  } else { go(); }
}

function saveGame(){
  const key=S.createCat.trim();if(!key||S.createWords.length===0)return;
  const u={...S.created};
  if(S.editKey&&S.editKey!==key)delete u[S.editKey];
  u[key]=S.createWords;
  saveCreated(u);
  set({created:u,screen:"menu",editKey:null,createCat:"",createWords:[],wordInput:""});
}
function deleteGame(key){
  const u={...S.created};delete u[key];saveCreated(u);
  set({created:u,confirmDelete:null,selCat:S.selCat===key?null:S.selCat});
}
function addWord(){
  const w=S.wordInput.trim();
  if(w&&!S.createWords.includes(w))S.createWords.push(w);
  set({wordInput:""});
}
function removeWord(w){set({createWords:S.createWords.filter(x=>x!==w)});}

// Keyboard (desktop test)
window.addEventListener("keydown",e=>{
  if(S.screen!=="playing")return;
  if(e.key==="ArrowUp")doCorrect();
  if(e.key==="ArrowDown")doPass();
});

// ── DOM helpers ───────────────────────────────────────────
function h(tag,attrs,children){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  for(const c of[].concat(children||[])){
    if(c==null)continue;
    e.appendChild(typeof c==="object"&&c instanceof Node?c:document.createTextNode(String(c)));
  }
  return e;
}
const d=(a,c)=>h("div",a,c);
const b=(a,c)=>h("button",a,c);
const inp=a=>h("input",a);
const sp=(a,c)=>h("span",a,c);
const center={display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"};

// ── Lightweight partial updates ───────────────────────────
function renderTimerBar(){
  const bar=document.getElementById("timerBar");
  const lbl=document.getElementById("timerLbl");
  if(!bar||!lbl)return;
  const pct=(S.timeLeft/S.selTimer)*100;
  const tc=S.timeLeft<=10?"#ef4444":S.timeLeft<=20?"#f97316":"#22c55e";
  bar.style.width=pct+"%";bar.style.background=tc;
  lbl.textContent=S.timeLeft+"s";lbl.style.color=tc;
}
function renderCountdownNum(){
  const el=document.getElementById("cdNum");
  if(el)el.textContent=S.countdown;
}
function renderFlash(){
  const el=document.getElementById("playBg");
  if(!el)return;
  el.style.background=S.flash==="correct"?"#16a34a":S.flash==="pass"?"#dc2626":"#1e1b4b";
}
function renderWord(){
  const el=document.getElementById("wordBox");
  if(!el)return;
  const word=S.deck[S.idx]||null;
  el.textContent=word||"🎉 Kartlar bitti!";
  el.style.fontSize=word?"34px":"26px";
  el.style.color=word?"#1e1b4b":"#6b7280";
}

      d({style:{fontSize:"15px",color:"#a5b4fc",marginBottom:"6px"}},["ve alnınıza dayayın"]),
      d({style:{fontSize:"13px",color:"#6b7280",marginTop:"24px"}},[S.selCat])
    ])
  ]);
}

function renderCountdown(){
  return d({style:{...center,minHeight:"100vh",background:"linear-gradient(135deg,#1e1b4b,#312e81)",padding:"24px",userSelect:"none"}},[
    d({style:{textAlign:"center"}},[
      d({style:{fontSize:"16px",color:"#a5b4fc",fontWeight:"700",marginBottom:"6px",letterSpacing:"2px"}},["TELEFONUNUZU ALNINIZIA DAYAYIN"]),
      d({style:{fontSize:"15px",color:"#818cf8",marginBottom:"32px"}},["Hazır olun!"]),
      d({id:"cdNum",style:{fontSize:"120px",fontWeight:"900",color:"#fff",lineHeight:"1",animation:"pulse 1s ease-in-out infinite",display:"block"}},[S.countdown]),
      d({style:{fontSize:"15px",color:"#a5b4fc",marginTop:"32px"}},[S.selCat])
    ]),
    h("style",{},["@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}"])
  ]);
}

function renderPaused(){
  const tc=S.timeLeft<=10?"#ef4444":S.timeLeft<=20?"#f97316":"#22c55e";
  return d({style:{...center,minHeight:"100vh",background:"#0f172a",userSelect:"none"}},[
    d({style:{textAlign:"center"}},[
      d({style:{fontSize:"64px",marginBottom:"16px"}},["⏸"]),
      d({style:{fontSize:"26px",fontWeight:"900",color:"#fff",marginBottom:"10px"}},["Duraklatıldı"]),
      d({style:{fontSize:"15px",color:"#94a3b8"}},["Telefonu yan çevir → devam eder"]),
      d({style:{fontSize:"13px",color:"#475569",marginTop:"24px"}},["Kalan: ",sp({style:{color:tc,fontWeight:"700"}},[S.timeLeft+"s"])])
    ])
  ]);
}

function renderPlaying(){
  const word=S.deck[S.idx]||null;
  const pct=(S.timeLeft/S.selTimer)*100;
  const tc=S.timeLeft<=10?"#ef4444":S.timeLeft<=20?"#f97316":"#22c55e";
  const bg=S.flash==="correct"?"#16a34a":S.flash==="pass"?"#dc2626":"#1e1b4b";

  return d({id:"playBg",style:{minHeight:"100vh",background:bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"space-between",padding:"24px 16px",transition:"background .3s",userSelect:"none"}},[
    d({style:{width:"100%",maxWidth:"400px"}},[
      d({style:{display:"flex",justifyContent:"space-between",color:"#fff",marginBottom:"6px",fontSize:"14px"}},[
        sp({},["✅ "+S.correct]),
        sp({id:"timerLbl",style:{fontSize:"22px",fontWeight:"700",color:tc}},[S.timeLeft+"s"]),
        sp({},["⏭ "+S.passed])
      ]),
      d({style:{background:"#ffffff33",borderRadius:"99px",height:"8px",overflow:"hidden"}},[
        d({id:"timerBar",style:{height:"100%",width:pct+"%",background:tc,borderRadius:"99px",transition:"width 1s linear"}},[])
      ])
    ]),
    d({style:{flex:"1",display:"flex",alignItems:"center",justifyContent:"center",width:"100%",maxWidth:"400px"}},[
      d({style:{background:"#fff",borderRadius:"24px",padding:"40px 24px",textAlign:"center",width:"100%",boxShadow:"0 8px 32px rgba(0,0,0,.25)"}},[
        d({style:{fontSize:"11px",color:"#6b7280",marginBottom:"8px",letterSpacing:"2px",textTransform:"uppercase"}},[S.selCat]),
        d({id:"wordBox",style:{fontSize:word?"34px":"26px",fontWeight:"800",color:word?"#1e1b4b":"#6b7280",lineHeight:"1.2",minHeight:"80px",display:"flex",alignItems:"center",justifyContent:"center"}},[word||"🎉 Kartlar bitti!"])
      ])
    ]),
    d({style:{width:"100%",maxWidth:"400px"}},[
      d({style:{color:"#ffffffaa",textAlign:"center",fontSize:"12px",marginBottom:"10px"}},["Ekran YUKARI → ✅ Doğru  ·  Ekran AŞAĞI → ⏭ Pas"]),
      d({style:{display:"flex",gap:"12px"}},[
        b({style:{flex:"1",padding:"20px 0",borderRadius:"16px",background:"#ef4444",color:"#fff",fontSize:"18px",fontWeight:"700"},onClick:doPass},["⬇ Pas"]),
        b({style:{flex:"1",padding:"20px 0",borderRadius:"16px",background:"#22c55e",color:"#fff",fontSize:"18px",fontWeight:"700"},onClick:doCorrect},["⬆ Doğru"])
      ])
    ])
  ]);
}

function renderResult(){
  const items=S.results.map(r=>
    d({style:{display:"flex",alignItems:"center",justifyContent:"space-between",background:r.r==="correct"?"#f0fdf4":"#fef2f2",borderRadius:"10px",padding:"8px 14px",marginBottom:"6px"}},[
      sp({style:{fontWeight:"600",color:"#1e1b4b",fontSize:"15px"}},[r.word]),
      sp({style:{fontSize:"18px"}},[r.r==="correct"?"✅":"⏭"])
    ])
  );
  return d({style:{minHeight:"100vh",background:"linear-gradient(135deg,#1e1b4b,#312e81)",padding:"32px 16px",overflowY:"auto"}},[
    d({style:{maxWidth:"420px",margin:"0 auto"}},[
      d({style:{background:"#fff",borderRadius:"28px",padding:"32px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.4)"}},[
        d({style:{textAlign:"center",marginBottom:"20px"}},[
          d({style:{fontSize:"48px"}},["🎉"]),
          d({style:{fontSize:"26px",fontWeight:"800",color:"#1e1b4b",margin:"8px 0 2px"}},["Süre Doldu!"]),
          d({style:{color:"#6b7280"}},[S.selCat])
        ]),
        d({style:{display:"flex",gap:"12px",justifyContent:"center",marginBottom:"20px"}},[
          d({style:{background:"#f0fdf4",borderRadius:"16px",padding:"16px 28px",textAlign:"center"}},[
            d({style:{fontSize:"36px",fontWeight:"800",color:"#16a34a"}},[String(S.correct)]),
            d({style:{fontSize:"13px",color:"#16a34a"}},["Doğru"])
          ]),
          d({style:{background:"#fef2f2",borderRadius:"16px",padding:"16px 28px",textAlign:"center"}},[
            d({style:{fontSize:"36px",fontWeight:"800",color:"#dc2626"}},[String(S.passed)]),
            d({style:{fontSize:"13px",color:"#dc2626"}},["Pas"])
          ])
        ]),
        items.length?d({style:{marginBottom:"20px"}},[
          d({style:{fontSize:"12px",fontWeight:"700",color:"#6b7280",letterSpacing:"1.5px",marginBottom:"10px"}},["BU TURDAKİ KELİMELER"]),
          d({},items)
        ]):null,
        b({style:{width:"100%",padding:"14px 0",borderRadius:"14px",background:"#4f46e5",color:"#fff",fontSize:"16px",fontWeight:"700",marginBottom:"10px"},onClick:startGame},["🔄 Tekrar Oyna"]),
        b({style:{width:"100%",padding:"14px 0",borderRadius:"14px",background:"#f3f4f6",color:"#374151",fontSize:"16px",fontWeight:"600"},onClick:()=>set({screen:"menu"})},["← Ana Menü"])
      ])
    ])
  ]);
}

function renderCreate(){
  const canSave=S.createCat.trim()&&S.createWords.length>0;
  const catInp=inp({value:S.createCat,placeholder:"ör. Türk Oyuncular",style:{width:"100%",padding:"10px 14px",borderRadius:"10px",border:"1.5px solid #e5e7eb",fontSize:"15px",outline:"none",marginTop:"8px",marginBottom:"20px"}});
  catInp.addEventListener("input",e=>{S.createCat=e.target.value;});
  const wInp=inp({value:S.wordInput,placeholder:"Kelime yaz, Enter veya Ekle",style:{flex:"1",padding:"10px 14px",borderRadius:"10px",border:"1.5px solid #e5e7eb",fontSize:"15px",outline:"none"}});
  wInp.addEventListener("input",e=>{S.wordInput=e.target.value;});
  wInp.addEventListener("keydown",e=>{if(e.key==="Enter")addWord();});
  const chips=S.createWords.map(w=>sp({style:{background:"#ede9fe",color:"#4f46e5",borderRadius:"99px",padding:"6px 12px",fontSize:"14px",fontWeight:"600",display:"inline-flex",alignItems:"center",gap:"6px",margin:"4px"}},[
    w,sp({style:{cursor:"pointer",color:"#7c3aed",fontWeight:"900"},onClick:()=>removeWord(w)},["×"])
  ]));
  return d({style:{minHeight:"100vh",background:"#f9fafb",padding:"env(safe-area-inset-top,24px) 16px 24px"}},[
    d({style:{maxWidth:"420px",margin:"0 auto"}},[
      b({style:{background:"none",color:"#4f46e5",fontSize:"15px",marginBottom:"16px",padding:"0"},onClick:()=>set({screen:"menu"})},["← Geri"]),
      d({style:{fontSize:"26px",fontWeight:"800",color:"#1e1b4b",marginBottom:"20px"}},[S.editKey?"✏️ Düzenle":"✏️ Oyun Oluştur"]),
      d({style:{fontSize:"13px",color:"#6b7280",fontWeight:"600"}},["KATEGORİ ADI"]),
      catInp,
      d({style:{fontSize:"13px",color:"#6b7280",fontWeight:"600"}},["KELİMELER ("+S.createWords.length+")"]),
      d({style:{display:"flex",gap:"8px",margin:"8px 0 12px"}},[
        wInp,
        b({style:{padding:"10px 16px",borderRadius:"10px",background:"#4f46e5",color:"#fff",fontWeight:"700"},onClick:addWord},["Ekle"])
      ]),
      d({style:{display:"flex",flexWrap:"wrap",minHeight:"40px",marginBottom:"28px"}},
        chips.length?chips:[sp({style:{color:"#d1d5db",fontSize:"14px"}},["Henüz kelime yok..."])]
      ),
      b({style:{width:"100%",padding:"15px 0",borderRadius:"14px",background:canSave?"#4f46e5":"#e5e7eb",color:canSave?"#fff":"#9ca3af",fontSize:"16px",fontWeight:"700"},onClick:saveGame},["💾 Kaydet"])
    ])
  ]);
}

function renderMenu(){
  const ac=allCats();
  const crKeys=Object.keys(S.created);

  const timerBtns=TIMERS.map(t=>b({
    style:{flex:"1",padding:"10px 0",borderRadius:"12px",border:S.selTimer===t?"2px solid #818cf8":"2px solid transparent",background:S.selTimer===t?"#4f46e5":"rgba(255,255,255,.13)",color:"#fff",fontSize:"16px",fontWeight:"700"},
    onClick:()=>set({selTimer:t})
  },[t+"s"]));

  const defBtns=Object.keys(CATS).map(cat=>{
    const ri=remInfo(cat);
    return b({
      style:{padding:"16px 20px",borderRadius:"16px",background:S.selCat===cat?"#4f46e5":"rgba(255,255,255,.11)",border:S.selCat===cat?"2px solid #818cf8":"2px solid transparent",color:"#fff",fontSize:"15px",fontWeight:"600",textAlign:"left",width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"},
      onClick:()=>set({selCat:cat})
    },[sp({},[cat]),sp({style:{fontSize:"11px",color:ri.c}},[ri.t])]);
  });

  const crBtns=crKeys.map(cat=>{
    const ri=remInfo(cat);
    return d({style:{borderRadius:"16px",overflow:"hidden",border:S.selCat===cat?"2px solid #4ade80":"2px solid transparent",marginBottom:"10px"}},[
      b({style:{width:"100%",padding:"16px 20px",background:S.selCat===cat?"#16a34a":"rgba(255,255,255,.11)",color:"#fff",fontSize:"15px",fontWeight:"600",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"},onClick:()=>set({selCat:cat})},[
        sp({},[cat]),sp({style:{fontSize:"11px",color:ri.c}},[ri.t])
      ]),
      d({style:{display:"flex",background:"rgba(255,255,255,.06)"}},[
        b({style:{flex:"1",padding:"9px 0",background:"none",borderRight:"1px solid rgba(255,255,255,.1)",color:"#a5b4fc",fontSize:"13px",fontWeight:"600"},onClick:()=>set({editKey:cat,createCat:cat,createWords:[...S.created[cat]],wordInput:"",screen:"create"})},["✏️ Düzenle"]),
        b({style:{flex:"1",padding:"9px 0",background:"none",color:"#fca5a5",fontSize:"13px",fontWeight:"600"},onClick:()=>set({confirmDelete:cat})},["🗑 Sil"])
      ])
    ]);
  });

  const el=d({style:{minHeight:"100vh",background:"linear-gradient(160deg,#1e1b4b 0%,#312e81 60%,#4f46e5 100%)",padding:"env(safe-area-inset-top,32px) 16px 32px"}},[
    d({style:{maxWidth:"420px",margin:"0 auto"}},[
      d({style:{textAlign:"center",marginBottom:"28px"}},[
        d({style:{fontSize:"48px"}},["🎯"]),
        d({style:{fontSize:"32px",fontWeight:"900",color:"#fff",margin:"8px 0 4px"}},["Heads Up!"]),
        d({style:{color:"#a5b4fc",fontSize:"15px"}},["📱 Telefonu yan çevir ve alnına tut!"])
      ]),
      d({style:{background:"rgba(255,255,255,.11)",borderRadius:"18px",padding:"16px 20px",marginBottom:"20px"}},[
        d({style:{color:"#c7d2fe",fontSize:"12px",fontWeight:"700",letterSpacing:"1.5px",marginBottom:"10px"}},["⏱ SÜRE"]),
        d({style:{display:"flex",gap:"10px"}},timerBtns)
      ]),
      d({style:{color:"#c7d2fe",fontSize:"12px",fontWeight:"700",letterSpacing:"1.5px",marginBottom:"10px"}},["📂 KATEGORİLER"]),
      d({},defBtns),
      ...(crKeys.length?[
        d({style:{color:"#86efac",fontSize:"12px",fontWeight:"700",letterSpacing:"1.5px",marginBottom:"10px",marginTop:"10px"}},["🛠 OLUŞTURULAN OYUNLAR"]),
        d({},crBtns)
      ]:[]),
      b({style:{width:"100%",padding:"18px 0",borderRadius:"18px",background:S.selCat?"#818cf8":"rgba(255,255,255,.13)",color:S.selCat?"#fff":"rgba(255,255,255,.35)",fontSize:"18px",fontWeight:"800",marginBottom:"12px",marginTop:"8px"},onClick:startGame},[S.selCat?"▶ Başla — "+S.selCat:"Önce kategori seç"]),
      b({style:{width:"100%",padding:"15px 0",borderRadius:"18px",background:"rgba(255,255,255,.11)",border:"2px solid rgba(255,255,255,.2)",color:"#fff",fontSize:"16px",fontWeight:"700"},onClick:()=>set({editKey:null,createCat:"",createWords:[],wordInput:"",screen:"create"})},["✏️ Oyun Oluştur"])
    ])
  ]);

  if(S.confirmDelete){
    el.appendChild(d({style:{position:"fixed",inset:"0",background:"rgba(0,0,0,.65)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:"99",padding:"24px"}},[
      d({style:{background:"#fff",borderRadius:"24px",padding:"32px 24px",maxWidth:"320px",width:"100%",textAlign:"center"}},[
        d({style:{fontSize:"36px",marginBottom:"12px"}},["🗑"]),
        d({style:{fontSize:"20px",fontWeight:"800",color:"#1e1b4b",marginBottom:"8px"}},["\""+S.confirmDelete+"\" silinsin mi?"]),
        d({style:{color:"#6b7280",fontSize:"14px",marginBottom:"24px"}},["Bu işlem geri alınamaz."]),
        d({style:{display:"flex",gap:"10px"}},[
          b({style:{flex:"1",padding:"12px 0",borderRadius:"12px",background:"#f3f4f6",color:"#374151",fontSize:"15px",fontWeight:"600"},onClick:()=>set({confirmDelete:null})},["İptal"]),
          b({style:{flex:"1",padding:"12px 0",borderRadius:"12px",background:"#ef4444",color:"#fff",fontSize:"15px",fontWeight:"700"},onClick:()=>deleteGame(S.confirmDelete)},["Sil"])
        ])
      ])
    ]));
  }
  return el;
}

// ── Main render ───────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  onScreenChange(S.screen);
  const scr=S.screen;
  if(scr==="waitLandscape") app.appendChild(renderWaitLandscape());
  else if(scr==="countdown")  app.appendChild(renderCountdown());
  else if(scr==="paused")     app.appendChild(renderPaused());
  else if(scr==="playing")    app.appendChild(renderPlaying());
  else if(scr==="result")     app.appendChild(renderResult());
  else if(scr==="create")     app.appendChild(renderCreate());
  else                         app.appendChild(renderMenu());
}

render();
</script>
</body>
</html>
